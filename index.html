body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: rgba(0,0,0,0.3);
}

button,input,select,textarea,[onclick],.energy-slot,.stat-box.clickable,.settings-trigger,.btn {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.app { width: 600px; max-width: 100vw; padding: 0 14px; }

/* ===== Header ===== */
.header { text-align: center; margin-bottom: 4px; }
.header h1 {
  font-size: 18px; font-weight: 900; letter-spacing: 1px;
  background: linear-gradient(135deg,#f0b90b 0%,#ffd54f 40%,#ffab00 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* ===== Settings Trigger ===== */
.settings-trigger {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--gold); cursor: pointer;
  padding: 4px 10px; margin-bottom: 6px;
  border: 1px solid rgba(240,185,11,0.3); border-radius: 14px;
  user-select: none; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Settings Modal ===== */
.settings-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75);
  justify-content: center; align-items: center;
  padding: 20px;
}
.settings-overlay.show { display: flex; }
.settings-modal {
  background: #fff; border: 1px solid #d0d5dd;
  border-radius: 12px; padding: 20px; width: 100%; max-width: 440px;
  max-height: 85vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: modalIn 0.25s ease-out;
  color: #1a1a1a;
}
@keyframes modalIn {
  0% { opacity: 0; transform: translateY(20px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.settings-modal .field { margin-bottom: 10px; }
.settings-modal label {
  display: block; font-size: 11px; color: #555;
  margin-bottom: 4px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.settings-modal input, .settings-modal select {
  width: 100%; padding: 8px 12px;
  background: #f5f6f8; border: 1px solid #d0d5dd; border-radius: 6px;
  color: #1a1a1a; font-size: 14px; font-family: inherit; outline: none;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.settings-modal input:focus, .settings-modal select:focus { border-color: #2979ff; }
.settings-modal .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.settings-modal .btn-row { display: flex; gap: 8px; margin-top: 14px; }
.settings-modal .btn-row button { flex: 1; }
.settings-modal .btn-secondary {
  background: #e8eaed; color: #333;
  border: 1px solid #c0c5cc; font-size: 13px; font-weight: 600;
}
.settings-modal .btn-secondary:hover { background: #d0d5dd; }
.settings-modal .btn-main {
  background: #2979ff; color: #fff;
  border: none; font-size: 13px; font-weight: 700;
}
.settings-modal .btn-main:hover { background: #1c6ae8; }

/* ===== Player Card ===== */
.player-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; margin-bottom: 8px;
  background: none; border: none; box-shadow: none;
}
.player-face {
  width: 72px; height: 72px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: rgba(255,255,255,0.15);
  overflow: hidden;
}
.player-face.has-img {
  width: 115px; height: 150px;
  background: transparent; border: none; border-radius: 0;
  outline: none; box-shadow: none;
}
.player-info { flex: 1; min-width: 0; }
.player-info .name-row {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 6px; margin-left: -6px;
}
.player-info .season-badge {
  display: inline-block; background: #2979ff; color: #fff;
  font-size: 13px; font-weight: 900; padding: 1px 7px; border-radius: 3px;
  letter-spacing: 0.5px; flex-shrink: 0;
}
.player-info .season-badge.season-25ucl {
  background: none; padding: 0;
  width: 38px; height: 36px;
}
.player-info .player-name {
  font-size: 17px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-info .player-pos {
  font-size: 14px; font-weight: 700; color: #d20514;
  margin-bottom: 6px;
}
.player-info .trait-row {
  display: flex; gap: 3px; margin-top: 3px;
}
.player-info .trait-dot {
  width: 10px; height: 10px; border-radius: 2px;
  background: rgba(255,255,255,0.08);
}
.player-info .trait-dot.on { background: rgba(240,185,11,0.6); }
.player-info .player-value {
  font-size: 10px; color: var(--text3); margin-top: 6px;
}
.player-right { text-align: right; flex-shrink: 0; }
.player-right .player-ovr {
  font-size: 42px; font-weight: 900; line-height: 1;
  background: linear-gradient(180deg,#fff 0%,#b0c0d8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.player-right .enhance-badge {
  display: inline-block; font-size: 13px; font-weight: 700;
  padding: 1px 8px; border-radius: 3px; margin-top: 2px;
}
.player-right .enhance-badge.low { color: #fff; background: rgba(255,255,255,0.15); }
.player-right .enhance-badge.mid { color: #f0b90b; background: rgba(240,185,11,0.2); border: 1px solid rgba(240,185,11,0.3); }
.player-right .enhance-badge.high { color: #ff6d00; background: rgba(255,109,0,0.2); border: 1px solid rgba(255,109,0,0.3); }
.player-right .enhance-badge.ult { color: #ff1744; background: rgba(255,23,68,0.2); border: 1px solid rgba(255,23,68,0.3); animation: badgeGlow 1.5s ease-in-out infinite; }
@keyframes badgeGlow {
  0%,100% { box-shadow: 0 0 6px rgba(255,23,68,0.3); }
  50% { box-shadow: 0 0 14px rgba(255,23,68,0.6); }
}

/* ===== Progress Bar ===== */
.progress-section { margin-bottom: 6px; }
.progress-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px; font-size: 11px;
}
.progress-title { color: var(--text2); font-weight: 600; }
.progress-rate { color: var(--text3); }
.progress-rate strong { color: #fff; }
.progress-bar {
  display: flex; align-items: center; gap: 2px; overflow: hidden;
}
.progress-step {
  width: 26px; height: 26px; min-width: 16px;
  border-radius: 5px;
  background: rgba(20,30,50,0.5);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #5a6070;
  transition: all 0.35s; flex-shrink: 1;
}
.progress-step.reached {
  background: rgba(0,200,83,0.15); border-color: rgba(0,200,83,0.3);
  color: #6aaa70;
}
.progress-step.current {
  background: linear-gradient(135deg,#6a3808,#4a2804);
  border-color: #f0b90b; color: #fff;
  box-shadow: 0 0 10px rgba(240,185,11,0.35);
  animation: stepPulse 0.6s ease-in-out infinite;
  transform: scale(1.1); z-index: 1;
}
@keyframes stepPulse {
  0%,100% { box-shadow: 0 0 10px rgba(240,185,11,0.35); }
  50% { box-shadow: 0 0 18px rgba(240,185,11,0.55); }
}
.progress-arrow { font-size: 10px; color: rgba(255,255,255,0.1); flex-shrink: 0; margin: 0 1px; }
@media (max-width: 480px) {
  .progress-bar { gap: 0; }
  .progress-step { width: 18px; height: 18px; min-width: 14px; font-size: 7px; border-radius: 3px; }
  .progress-arrow { font-size: 7px; flex-shrink: 1; margin: 0; }
}

/* ===== Info Chips ===== */
.info-row { display: flex; gap: 6px; margin-bottom: 6px; }
.info-chip { flex: 1; text-align: center; padding: 6px 4px; }
.info-chip .val { font-size: 14px; font-weight: 700; color: #fff; }
.info-chip .val.gold { color: var(--gold); }
.info-chip .val.green { color: var(--success); }
.info-chip .val.red { color: var(--fail); }
.info-chip .lbl { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* ===== Protection ===== */
.protect-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text2); margin-bottom: 6px;
  gap: 10px;
}
.protect-badge {
  font-size: 10px; background: rgba(240,185,11,0.15);
  color: var(--gold); padding: 1px 6px; border-radius: 3px; font-weight: 600;
}

/* ===== Material Slots ===== */
.material-section { margin-bottom: 6px; }
.material-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 5px; font-size: 11px;
}
.material-header .title { color: var(--text2); font-weight: 600; }
.material-header .boost { color: var(--accent); font-weight: 600; }
.energy-slots { display: flex; gap: 5px; margin-bottom: 5px; }
.energy-slot {
  flex: 1; height: 30px; border-radius: 5px;
  background: rgba(20,30,50,0.5); border: 2px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.energy-slot::before {
  content: attr(data-slot);
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #000;
  z-index: 2; pointer-events: none;
}
.energy-slot.filled::before { color: #000; }
.energy-slot .fill {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,#5bb8ff 0%,#3a9aee 100%);
  transition: width 0.3s ease; border-radius: 3px;
}
.energy-slot.filled {
  border-color: #5bb8ff;
  box-shadow: 0 0 6px rgba(91,184,255,0.3);
}

/* ===== Buttons ===== */
.btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
.btn {
  padding: 10px 16px; border-radius: 6px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; letter-spacing: 0.5px;
  user-select: none; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.btn-main {
  flex: 1;
  background: #00e559;
  color: #151616; font-size: 18px; letter-spacing: 3px;
  box-shadow: 0 4px 16px rgba(0,229,89,0.3);
  position: relative; overflow: hidden;
}
.btn-main:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(0,229,89,0.45); }
.btn-main:active:not(:disabled) { transform: translateY(1px); }
.btn-main.charging {
  animation: btnCharge 0.2s ease-in-out infinite;
  background: #00e559;
}
@keyframes btnCharge {
  0%,100% { box-shadow: 0 4px 16px rgba(0,229,89,0.3); }
  50% { box-shadow: 0 4px 32px rgba(0,229,89,0.7),0 0 60px rgba(0,229,89,0.3); }
}
.btn-secondary {
  background: rgba(255,255,255,0.08); color: var(--text2);
  font-size: 12px; border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.14); color: #fff; }
.btn-secondary.active { background: rgba(41,121,255,0.2); border-color: var(--accent); color: #aaccff; }

/* ===== Stats ===== */
.stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 4px; margin-bottom: 4px;
}
.stat-box { text-align: center; padding: 6px 4px; }
.stat-box .num { font-size: 17px; font-weight: 700; color: #fff; }
.stat-box .num.g { color: var(--gold); }
.stat-box .num.s { color: var(--success); }
.stat-box .num.f { color: var(--fail); }
.stat-box .tag { font-size: 9px; color: var(--text3); margin-top: 1px; }
.stat-box.clickable { cursor: pointer; position: relative; touch-action: manipulation; }

/* ===== History ===== */
.history-box {
  height: 120px; overflow-y: scroll !important;
  -webkit-overflow-scrolling: touch; overscroll-behavior: auto;
  scroll-behavior: smooth; will-change: scroll-position;
  padding-right: 4px;
  touch-action: pan-y; -webkit-user-select: text;
  pointer-events: auto;
}
.history-box::-webkit-scrollbar { width: 3px; }
.history-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.history-title { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
.history-list { list-style: none; }
.history-item {
  display: flex; align-items: center; gap: 4px;
  padding: 2px; font-size: 10px;
}
.hist-num { color: var(--text3); font-size: 9px; min-width: 20px; }
.hist-tag { font-weight: 700; padding: 0px 5px; border-radius: 2px; font-size: 9px; flex-shrink: 0; }
.hist-tag.win { background: rgba(0,200,83,0.15); color: var(--success); }
.hist-tag.lose { background: rgba(229,57,53,0.12); color: var(--fail); }
.hist-detail { color: var(--text2); flex: 1; }
.hist-empty { color: var(--text3); text-align: center; padding: 16px; font-size: 11px; }

/* ===== Hint ===== */
.hint { text-align: center; font-size: 9px; color: var(--text3); margin-top: 6px; }
.hint kbd {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 2px; padding: 0px 4px; font-size: 9px; font-family: inherit;
}

/* ===== Rate help icon ===== */
.rate-help {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
  font-size: 9px; font-weight: 700; cursor: pointer;
  vertical-align: middle; margin-left: 2px;
  touch-action: manipulation; user-select: none; position: relative;
}
.rate-help:hover,.rate-help.active { background: #f0b90b; color: #000; }
.rate-tooltip {
  display: none; position: fixed;
  background: #0a0a0a; color: #ddd; font-size: 11px; font-weight: 400;
  line-height: 1.6; padding: 10px 14px; border-radius: 8px;
  border: 1px solid #3a4860; white-space: pre-line;
  min-width: 260px; max-width: 320px; z-index: 600;
  pointer-events: auto; cursor: default;
}
.rate-tooltip.show { display: block; animation: fadeIn 0.15s ease-out; }
@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ===== Success Tooltip (narrow, scrollable) ===== */
.success-tooltip {
  display: none; position: fixed;
  background: #0a0a0a; color: #ddd;
  border: 1px solid #3a4860; border-radius: 8px;
  padding: 8px 10px; width: 195px; max-width: 195px;
  max-height: 220px; overflow-y: auto;
  z-index: 700; pointer-events: auto; cursor: default;
  font-size: 10px; line-height: 1.45;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.success-tooltip.show { display: block; animation: fadeIn 0.15s ease-out; }
.st-list { }
.st-item {
  padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  white-space: normal; word-break: break-all;
  font-size: 10px; color: #bbb;
}
.st-item:last-child { border-bottom: none; }

/* ===== Player Card Animations ===== */
.player-card.success-glow { box-shadow: 0 0 24px rgba(0,200,83,0.5); }
.player-card.enhance-flash { animation: cardFlash 0.1s ease-in-out 3; }
@keyframes cardFlash {
  0%,100% { box-shadow: none; }
  50% { box-shadow: 0 0 16px rgba(240,185,11,0.3); }
}
.player-card.fail-shake { animation: shake 0.3s ease-out; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  30% { transform: translateX(8px); }
  45% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  75% { transform: translateX(-3px); }
  90% { transform: translateX(3px); }
}

/* ===== Burst Overlay (强化过程动画) ===== */
.burst-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 9998; display: none; justify-content: center; align-items: center;
  flex-direction: column; overflow: hidden;
}
.burst-overlay.show { display: flex; }
.burst-overlay .burst-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 60%, #0a2a3a 0%, #060c16 60%, #000 100%);
}
.burst-overlay .burst-bg::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 200px;
  background: radial-gradient(ellipse at 50% 100%, rgba(30,120,70,0.3) 0%, transparent 70%);
}
.burst-spotlight {
  position: absolute; top: -10%; left: 50%; transform: translateX(-50%);
  width: 350px; height: 75%; z-index: 3; opacity: 0;
  background: linear-gradient(180deg, rgba(180,220,255,0.6) 0%, rgba(100,200,255,0.25) 25%, rgba(100,200,255,0.08) 50%, transparent 80%);
  clip-path: polygon(35% 0%, 65% 0%, 90% 100%, 10% 100%); filter: blur(25px);
  transition: opacity 0.6s;
}
.burst-spotlight.on { opacity: 1; }
.burst-spot-glow {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; height: 55%; z-index: 2; opacity: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(150,210,255,0.18) 0%, rgba(100,180,255,0.06) 40%, transparent 70%);
  filter: blur(10px); transition: opacity 0.6s;
}
.burst-spot-glow.on { opacity: 1; }
.burst-beam {
  position: absolute; left: 50%; top: -5%; height: 110%;
  background: linear-gradient(180deg, rgba(100,200,255,0.6) 0%, rgba(100,200,255,0.3) 40%, transparent 100%);
  z-index: 3; opacity: 0; transition: opacity 0.3s;
}
.burst-beam.on { opacity: 1; }
.burst-beam.b1 { width: 3px; margin-left: 0; }
.burst-beam.b2 { width: 2px; margin-left: -40px; }
.burst-beam.b3 { width: 1px; margin-left: 50px; }
.burst-beam.b4 { width: 3px; margin-left: -80px; }
.burst-beam.b5 { width: 1px; margin-left: 70px; }

.burst-card-wrap { position: relative; z-index: 5; }
.burst-card {
  width: 230px; position: relative; z-index: 5; overflow: visible;
  will-change: transform, filter;
}
.burst-card-wrap.zoom-in {
  animation: card-zoom-in 0.5s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes card-zoom-in {
  0% { transform: translate3d(0, 0, 0) scale(0.75); }
  100% { transform: translate3d(0, 0, 0) scale(1.0); }
}
.burst-card.shake-s1 { animation: burst-shake 0.45s ease-in-out infinite; }
.burst-card.shake-s2 { animation: burst-shake 0.22s ease-in-out infinite; }
.burst-card.shake-s3 { animation: burst-shake 0.10s ease-in-out infinite; }
.burst-card.shake-s4 { animation: burst-shake 0.05s linear infinite; }
.burst-card.anim-stop { animation: none !important; }
.burst-card.purple-shadow::after {
  content: ""; position: absolute; inset: 0; z-index: -1; opacity: 0.6;
  filter: brightness(0) drop-shadow(0 0 20px rgba(200,50,255,0.8));
  mix-blend-mode: screen;
}

@keyframes burst-shake {
  0%, 100% { transform: translate3d(0, 0, 0); }
  10% { transform: translate3d(-1px, 0, 0); }
  20% { transform: translate3d(2px, 0, 0); }
  30% { transform: translate3d(-3px, 0, 0); }
  40% { transform: translate3d(4px, 0, 0); }
  50% { transform: translate3d(-5px, 0, 0); }
  60% { transform: translate3d(6px, 0, 0); }
  70% { transform: translate3d(-7px, 0, 0); }
  80% { transform: translate3d(9px, 0, 0); }
  90% { transform: translate3d(-11px, 0, 0); }
}

/* Rain particles */
.rain-particle {
  position: absolute; width: 1px;
  background: linear-gradient(180deg, rgba(150,200,255,0.8), transparent);
  z-index: 3; pointer-events: none;
  will-change: transform, opacity;
  animation: rainFall linear forwards;
}
@keyframes rainFall {
  0% { transform: translate3d(0, -20px, 0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translate3d(0, 105vh, 0); opacity: 0; }
}
/* White burst particles */
.burst-particle {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 100;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
  box-shadow: 0 0 15px rgba(255,255,255,0.9); filter: blur(3px);
  animation: burstParticleFly ease-out forwards;
}
@keyframes burstParticleFly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--bx),var(--by)) scale(0); }
}

/* Smoke particles for fail */
.smoke-particle {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 10;
  background: radial-gradient(circle, rgba(80,80,80,0.6) 0%, rgba(40,40,40,0.3) 40%, transparent 70%);
  filter: blur(4px); animation: smokeRise ease-out forwards;
}
@keyframes smokeRise {
  0% { opacity: 0.7; transform: translate(0,0) scale(0.5); }
  100% { opacity: 0; transform: translate(var(--sx),var(--sy)) scale(2); }
}

/* Shatter effect */
.shatter-effect {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(1.5);
  width: 256px; height: 256px;
  background-image: url("images/shatter_sprite.webp");
  background-size: 2048px auto; background-repeat: no-repeat;
  pointer-events: none; z-index: 100; display: none;
}
.shatter-effect.animate {
  display: block;
  animation: shatter-play 0.8s step-end forwards, shatter-scale 0.8s ease-out forwards;
  filter: brightness(2) contrast(1.2) drop-shadow(0 0 25px #fff);
  mix-blend-mode: screen;
}
@keyframes shatter-scale {
  0% { transform: translate(-50%, -50%) scale(2.2); }
  100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
}
@keyframes shatter-play {
  0% { background-position: 0px 0px; }
  5.5% { background-position: -256px 0px; }
  11.1% { background-position: -512px 0px; }
  16.6% { background-position: -768px 0px; }
  22.2% { background-position: -1024px 0px; }
  27.7% { background-position: -1280px 0px; }
  33.3% { background-position: -1536px 0px; }
  38.8% { background-position: -1792px 0px; }
  44.4% { background-position: 0px -256px; }
  50% { background-position: -256px -256px; }
  55.5% { background-position: -512px -256px; }
  61.1% { background-position: -768px -256px; }
  66.6% { background-position: -1024px -256px; }
  72.2% { background-position: -1280px -256px; }
  77.7% { background-position: -1536px -256px; }
  83.3% { background-position: -1792px -256px; }
  88.8% { background-position: 0px -512px; }
  94.4% { background-position: -256px -512px; }
  100% { background-position: -512px -512px; }
}

/* Skip button */
.burst-skip {
  position: absolute; bottom: 30px; right: 20px; color: rgba(255,255,255,0.5);
  font-weight: 700; font-size: 0.9em; cursor: pointer; z-index: 20;
  letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,0,0,0.8);
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}

/* ===== Result Overlay ===== */
.result-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 9999; display: none; justify-content: center; align-items: center;
  flex-direction: column;
  background: radial-gradient(ellipse at 50% 60%, #0a2a3a 0%, #060c16 60%, #000 100%);
  overflow-y: auto; overflow-x: hidden;
}
.result-overlay.show { display: flex; }
.result-card-wrap { position: relative; margin-bottom: 20px; }
.result-card {
  width: 230px; position: relative; z-index: 2;
  animation: resultCardIn 1.5s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes resultCardIn {
  0% { transform: scale(0.7) translateY(100px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.result-overlay.success .result-card {
  animation: resultCardIn 1.5s cubic-bezier(0.25,0.46,0.45,0.94), card-float 3s ease-in-out 1.7s infinite;
}
.result-overlay.success .result-card::before {
  content: ""; position: absolute; top: 50%; left: 50%; width: 140%; height: 140%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.3) 20%, rgba(0,255,234,0.15) 45%, transparent 70%);
  border-radius: 50%; z-index: -1;
  animation: glow-pulse 2s infinite alternate;
}
.result-overlay.fail .result-card { filter: grayscale(0.85) brightness(0.45); }
@keyframes glow-pulse {
  0% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
}
@keyframes card-float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.result-text-wrap {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 1.2s cubic-bezier(0.22,0.61,0.36,1), opacity 0.6s ease;
  width: 85%; max-width: 320px; text-align: center;
}
.result-text-wrap.expand { max-height: 600px; opacity: 1; overflow: visible; }
.result-title { font-size: 1.6em; font-weight: 700; margin: 10px 0 16px; }
.result-overlay.success .result-title { color: #e8d5a3; text-shadow: 0 0 20px rgba(232,213,163,0.5); }
.result-overlay.fail .result-title { color: #e74c3c; text-shadow: 0 0 20px rgba(231,76,60,0.4); }
.result-subtitle { font-size: 1em; color: #aaa; margin-bottom: 16px; }
.result-stats {
  background: rgba(18,18,24,0.9); border-radius: 12px; padding: 16px; width: 100%;
  margin: 10px 0; border: 1px solid rgba(255,255,255,0.08);
  opacity: 0; transform: translateY(15px);
  transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
  box-sizing: border-box;
}
.result-stats.fade-in { opacity: 1; transform: translateY(0); }
.result-stats .rs-row { display: flex; justify-content: space-between; font-size: 0.9em; color: #ccc; margin-bottom: 6px; }
.result-stats .rs-row:last-child { margin-bottom: 0; }
.result-stats .rs-label { color: #888; }
.result-stats .rs-value { color: #fff; font-weight: 700; }
.result-next-bar {
  display: block; width: 100%; max-width: 360px; margin: 20px auto 0;
  padding: 13px 0; border: none;
  background: #00e559; color: #151616;
  font-size: 1.05em; font-weight: 700;
  border-radius: 10px; cursor: pointer; font-family: inherit;
  letter-spacing: 2px;
  box-shadow: 0 4px 16px rgba(0,229,89,0.3);
  transition: box-shadow 0.2s, transform 0.15s;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.result-next-bar:hover { box-shadow: 0 6px 24px rgba(0,229,89,0.45); }
.result-next-bar:active { transform: translateY(1px); }

@media (max-width: 480px) {
  .player-face.has-img { width: 105px; height: 137px; }
  .player-right .player-ovr { font-size: 36px; }
  .burst-card { width: 160px; }
  .result-card { width: 170px; }
  .shatter-effect.animate { animation: shatter-play 0.8s step-end forwards, shatter-scale-mobile 0.8s ease-out forwards; }
  @keyframes shatter-scale-mobile {
    0% { transform: translate(-50%, -50%) scale(1.8); }
    100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
  }
}

/* ===== Particles ===== */
.particle-layer { position: fixed; inset: 0; pointer-events: none; z-index: 250; }
.pt {
  position: absolute; font-size: 22px;
  animation: ptFly 0.6s ease-out forwards;
  will-change: transform,opacity;
}
@keyframes ptFly {
  0% { opacity: 1; transform: translate(0,0) scale(1.2); }
  100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
}

/* ===== Material Input ===== */
.mat-input-row { display: flex; gap: 5px; align-items: center; margin-bottom: 6px; }
.mat-input-row input {
  width: 52px; padding: 5px 6px;
  background: rgba(20,30,50,0.5); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; color: var(--text); font-size: 12px;
  text-align: center; font-family: inherit; outline: none;
}
.mat-input-row .mat-btn {
  background: rgba(255,255,255,0.06); color: var(--text2);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
  padding: 5px 10px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}

/* ===== Stop Level ===== */
.stop-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text2); margin-bottom: 6px;
}
.stop-row input {
  width: 44px; padding: 5px 6px;

  border-radius: 4px; color: var(--text); font-size: 13px;
  text-align: center; font-family: inherit; outline: none;
}

function populatePlayerSelect() {
  const sel = document.getElementById('inpPlayerSelect');
  // Keep the first "custom" option
  sel.innerHTML = '<option value="">— 自定义球员 —</option>';
  // Group by position
  const positions = [...new Set(PLAYER_DB.map(p => p.position))];
  positions.sort();
  positions.forEach(pos => {
    const group = document.createElement('optgroup');
    group.label = pos;
    const players = PLAYER_DB.filter(p => p.position === pos);
    players.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name + ' · OVR ' + p.ovr;
      opt.dataset.position = p.position;
      opt.dataset.ovr = p.ovr;
      opt.dataset.enhance = p.enhance;
      group.appendChild(opt);
    });
    sel.appendChild(group);
  });
}

function onPlayerSelect() {
  const sel = document.getElementById('inpPlayerSelect');
  const name = sel.value;
  if (!name) return; // "自定义" option
  const opt = sel.selectedOptions[0];
  document.getElementById('inpName').value = name;
  document.getElementById('inpPos').value = opt.dataset.position;
  document.getElementById('inpOvr').value = opt.dataset.ovr;
  document.getElementById('inpLevel').value = opt.dataset.enhance;
  document.getElementById('inpSeason').value = '25ucl';
  // Don't auto-apply — user must click 应用设置
}

// ============================================================
//  Material Card Energy Bar
// ============================================================
function addMaterial() {
  if (materialCards.length >= 5) return;
  const inp = document.getElementById('inpMaterialOvr');
  const ovr = Math.max(40, Math.min(150, parseInt(inp.value) || baseOvr));
  inp.value = ovr;
  materialCards.push({ ovr });
  updateEnergyBar();
}

function clearMaterials() {
  materialCards = [];
  updateEnergyBar();
}

function clickSlot(n) {
  // Manual fill: clicking slot N means fill slots 1..N
  const currentFilled = Math.round(getTotalFill());
  if (currentFilled === n) {
    // Toggle off
    materialCards = [];
  } else {
    // Fill to N slots with current-OVR materials
    materialCards = [];
    for (let i = 0; i < n; i++) {
      materialCards.push({ ovr: curOvr() });
    }
  }
  updateEnergyBar();
}

function calcFillRatio(matOvr) {
  // 以球员当前实际OVR为基准（非基础OVR）
  const currentOvr = curOvr();
  const diff = matOvr - currentOvr;
  return Math.max(0.1, 1.0 + diff * 0.1);
}

function getTotalFill() {
  let total = 0;
  materialCards.forEach(m => { total += calcFillRatio(m.ovr); });
  return Math.min(total, 5);
}

function getMaterialBoost() {
  return Math.round(getTotalFill()) * 1; // 每格 +1% 成功率
}

function updateEnergyBar() {
  const totalFill = getTotalFill();
  const fullSlots = Math.floor(totalFill);
  const partialFill = totalFill - fullSlots;

  for (let i = 0; i < 5; i++) {
    const slot = document.querySelector(`.energy-slot[data-slot="${i+1}"]`);
    if (!slot) continue;
    // Clear old fill
    const oldFill = slot.querySelector('.fill');
    if (oldFill) oldFill.remove();

    if (i < fullSlots) {
      // Fully filled
      slot.classList.add('filled');
      const fill = document.createElement('div');
      fill.className = 'fill';
      fill.style.width = '100%';
      slot.appendChild(fill);
    } else if (i === fullSlots && partialFill > 0) {
      // Partially filled
      slot.classList.add('filled');
      const fill = document.createElement('div');
      fill.className = 'fill';
      fill.style.width = (partialFill * 100) + '%';
      slot.appendChild(fill);
    } else {
      // Empty
      slot.classList.remove('filled');
    }
  }

  document.getElementById('materialCount').textContent = `已填 ${materialCards.length}/5`;
  const boost = getMaterialBoost();
  document.getElementById('materialBoost').textContent = '+' + boost + '%';
}

function getFinalRate(baseRate) {
  const boost = getMaterialBoost() / 100; // convert to decimal
  return Math.min(1, baseRate + boost);
}

function data(lv) { return TABLE.find(d => d.level === lv) || TABLE[0]; }
function curOvr() { return baseOvr + data(currentLevel).bonus; }
function canEnhance() { return currentLevel < 13; }

//  UI Update
// ============================================================
function refreshAll() {
  const d = data(currentLevel);
  const ovr = curOvr();
  const nextLv = currentLevel + 1;
  const canUp = canEnhance();
  const nextD = canUp ? data(nextLv) : null;

  // Player card
  document.getElementById('playerOvr').textContent = ovr;
  const badge = document.getElementById('enhanceBadge');
  badge.textContent = '+' + currentLevel;
  badge.className = 'enhance-badge';
  if (currentLevel >= 12) badge.classList.add('ult');
  else if (currentLevel >= 8) badge.classList.add('high');
  else if (currentLevel >= 4) badge.classList.add('mid');
  else badge.classList.add('low');
  document.getElementById('playerName').textContent = playerName;
  document.getElementById('playerMeta').textContent = playerPos;

  // Season badge
  const sEl = document.getElementById('playerSeason');
  const seasonNames = {
    default:'基础卡', live:'LIVE', hot:'HOT', tots:'TOTS', toty:'TOTY',
    icon:'ICON', 'icon-tm':'ICON TM', wc:'WC', ucl:'UCL', ng:'NG', cap:'CAP'
  };
  const sznName = seasonNames[playerSeason] || playerSeason.toUpperCase();
  sEl.className = 'season-badge';
  if (playerSeason === 'tots') sEl.classList.add('season-tots');
  else if (playerSeason === 'toty') sEl.classList.add('season-toty');
  else if (playerSeason === 'icon' || playerSeason === 'icon-tm') sEl.classList.add('season-icon');
  else if (playerSeason === 'hot') sEl.classList.add('season-hot');
  else if (playerSeason === 'live') sEl.classList.add('season-live');
  else if (playerSeason === '25ucl') {
    sEl.classList.add('season-25ucl');
    sEl.innerHTML = '<img src="images/25ucl_badge.png" alt="25UCL" style="width:100%;height:100%;">';
  } else sEl.classList.add('season-default');
  if (playerSeason !== '25ucl') sEl.textContent = sznName;

  // Avatar — show card image from PLAYER_IMAGES if available
  const avatar = document.getElementById('playerAvatar');
  avatar.classList.remove('elite','legend','ultimate','has-img');
  const imgUrl = (typeof PLAYER_IMAGES !== 'undefined' && PLAYER_IMAGES[playerName]) ? PLAYER_IMAGES[playerName] : null;
  if (imgUrl) {
    avatar.textContent = '';
    avatar.innerHTML = `<img src="${imgUrl}" alt="${playerName}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
    avatar.classList.add('has-img');
  } else {
    avatar.innerHTML = '';
    avatar.textContent = '⚽';
  }
  if (currentLevel >= 12) avatar.classList.add('ultimate');
  else if (currentLevel >= 8) avatar.classList.add('legend');
  else if (currentLevel >= 5) avatar.classList.add('elite');

  // Trait slots (特性槽)
  const traitCount = currentLevel >= 12 ? 7 : currentLevel >= 9 ? 6 : currentLevel >= 6 ? 5 : currentLevel >= 3 ? 4 : 3;
  let traitHtml = '';
  for (let i = 0; i < 7; i++) {
    traitHtml += `<div class="trait-dot${i < traitCount ? ' on' : ''}"></div>`;
  }
  document.getElementById('traitSlots').innerHTML = traitHtml;

  // Estimated value
  const baseVal = baseOvr * baseOvr * 80;
  const lvMult = [1, 1.2, 1.5, 2, 3, 5, 8, 14, 22, 35, 55, 85, 130, 200];
  const val = Math.floor(baseVal * lvMult[currentLevel] / 10000);
  document.getElementById('estValue').textContent = '💰 预计价值: ' + (val >= 1 ? val + '万 BP' : '--');

  // Progress bar
  renderProgress();

  // Rate info
  if (!canUp) {
    document.getElementById('rateInfo').innerHTML = '<strong style="color:#f0b90b;">已满级 MAX +13</strong>';
    document.getElementById('btnEnhance').disabled = true;
    document.getElementById('btnEnhance').textContent = '已满级';
  } else {
    const effectiveRate = getFinalRate(nextD.rate);
    const r = (effectiveRate * 100);
    const rStr = r >= 1 ? r.toFixed(0) + '%' : r.toFixed(1) + '%';
    const boost = getMaterialBoost();
    const boostStr = boost > 0 ? ` <span style="color:#2979ff;font-size:11px;">(含材料+${boost}%)</span>` : '';
    document.getElementById('rateInfo').innerHTML = `+${currentLevel} → +${nextLv} 成功率 <strong>${rStr}</strong>${boostStr}`;
    document.getElementById('btnEnhance').disabled = false;
    document.getElementById('btnEnhance').textContent = '强 化';
  }

  // Info chips
  document.getElementById('infoNextLevel').textContent = canUp ? '+' + nextLv : 'MAX';
  document.getElementById('infoRate').textContent = canUp ? ((getFinalRate(nextD.rate)*100) >= 1 ? (getFinalRate(nextD.rate)*100).toFixed(0)+'%' : (getFinalRate(nextD.rate)*100).toFixed(1)+'%') : '-';
  document.getElementById('infoOvrGain').textContent = canUp ? ('+' + nextD.gain) : '-';
  document.getElementById('infoTargetOvr').textContent = canUp ? (baseOvr + nextD.bonus) : (baseOvr + d.bonus);

  // Protection slider: only available at +8 and above
  const slider = document.getElementById('protectSlider');
  const protectBadge = document.getElementById('protectBadge');
  if (slider) {
    if (currentLevel < 8) {
      slider.disabled = true;
      slider.value = 0;
      protectCount = 0;
      document.getElementById('protectCount').textContent = '0';
      if (protectBadge) protectBadge.style.display = 'none';
      if (slider.parentElement) slider.parentElement.style.opacity = '0.35';
    } else {
      slider.disabled = false;
      if (slider.parentElement) slider.parentElement.style.opacity = '1';
      if (protectBadge) {
        if (protectCount === 0) {
          protectBadge.style.display = 'inline';
          protectBadge.textContent = '推荐开启';
        } else {
          protectBadge.style.display = 'none';
        }
      }
    }
  }

  // Stats (with safety null checks)
  const sAttempts = document.getElementById('sAttempts');
  const sSuccess = document.getElementById('sSuccess');
  const sFail = document.getElementById('sFail');
  const stopLevelDisplay = document.getElementById('stopLevelDisplay');
  if (sAttempts) sAttempts.textContent = totalAttempts;
  if (sSuccess) sSuccess.textContent = totalSuccess;
  if (sFail) sFail.textContent = totalAttempts - totalSuccess;
  if (stopLevelDisplay) stopLevelDisplay.textContent = '+' + ((stopLevel > 13) ? 13 : stopLevel);

  // Button state
  if (!canUp) {
    document.getElementById('btnEnhance').disabled = true;
    if (autoMode) stopAuto();
  }

  renderHistory();
}

function renderProgress() {
  const bar = document.getElementById('progressBar');
  if (!bar) return;
  let html = '';
  for (let i = 0; i <= 13; i++) {
    if (i > 0) html += '<span class="progress-arrow">›</span>';
    let cls = 'progress-step';
    if (i < currentLevel) cls += ' reached';
    if (i === currentLevel) cls += ' current';
    html += `<div class="${cls}" title="+${i}: OVR ${baseOvr + data(i).bonus}">+${i}</div>`;
  }
  bar.innerHTML = html;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!list) return;
  if (history.length === 0) {
    list.innerHTML = '<li class="hist-empty">等待首次强化...</li>';
    return;
  }
  list.innerHTML = history.map(h => {
    let tagCls, tagText;
    if (h.result === 'success') { tagCls = 'win'; tagText = '成功'; }
    else { tagCls = 'lose'; tagText = '失败'; }
    return `<li class="history-item">
      <span class="hist-num">#${h.num}</span>
      <span class="hist-tag ${tagCls}">${tagText}</span>
      <span class="hist-detail">${h.desc}</span>
    </li>`;
  }).join('');
}

function onProtectSlider() {
  const slider = document.getElementById('protectSlider');
  protectCount = parseInt(slider.value) || 0;
  document.getElementById('protectCount').textContent = protectCount;
}
function hasProtection() { return currentLevel >= 8 && protectCount > 0; }

function toggleAuto() {
  if (autoMode) { stopAuto(); } else { startAuto(); }
}

function startAuto() {
  if (!canEnhance()) return;
  autoMode = true;
  const btn = document.getElementById('btnAuto');
  btn.textContent = '停止';
  btn.classList.add('active');
  doAutoStep();
}

function stopAuto() {
  autoMode = false;
  const btn = document.getElementById('btnAuto');
  btn.textContent = '自动';
  btn.classList.remove('active');
  if (autoTimer) clearTimeout(autoTimer);
}

function doAutoStep() {
  if (!autoMode || !canEnhance()) { stopAuto(); return; }
  if (currentLevel >= stopLevel) { stopAuto(); return; }
  if (!isEnhancing) startEnhance();
  autoTimer = setTimeout(() => doAutoStep(), 1800);
}

function resetCard() {
  if (isEnhancing) return;
  if (autoMode) stopAuto();
  currentLevel = 0;
  totalAttempts = 0;
  totalSuccess = 0;
  history = [];
  stopLevel = 13;
  document.getElementById('inpStopLevel').value = 13;
  protectCount = 0;
  document.getElementById('protectSlider').value = 0;
  document.getElementById('protectCount').textContent = '0';
  clearMaterials();
  document.getElementById('inpMaterialOvr').value = baseOvr;
  refreshAll();
}

function startEnhance() {
  if (isEnhancing || !canEnhance()) return;
  isEnhancing = true;

  const btn = document.getElementById('btnEnhance');
  btn.textContent = '强化中...';
  btn.disabled = true;

  showBurstOverlay();
}

function executeEnhance() {
  const nextLv = currentLevel + 1;
  const nextD = data(nextLv);
  const rate = getFinalRate(nextD.rate);
  const roll = Math.random();
  const success = roll < rate;

  totalAttempts++;

  if (success) {
    const oldOvr = curOvr();
    currentLevel = nextLv;
    totalSuccess++;
    const newOvr = curOvr();

    addHistory('success', '+' + (nextLv - 1) + ' → +' + nextLv + '  |  OVR ' + oldOvr + ' → ' + newOvr + '  |  第' + totalAttempts + '次成功');
    refreshAll();
    showBurstSuccess(nextLv, oldOvr, newOvr);

    if (currentLevel >= stopLevel && autoMode) stopAuto();
  } else {
    const oldOvr = curOvr();
    const oldLevel = currentLevel;

    let dropTo;
    if (!hasProtection()) {
      if (currentLevel === 2) {
        dropTo = 1;
      } else if (currentLevel === 3) {
        dropTo = Math.random() < 0.5 ? 1 : 2;
      } else if (currentLevel >= 4 && currentLevel <= 7) {
        dropTo = 1;
      } else {
        dropTo = Math.floor(Math.random() * 6) + 1;
      }
      const dropOvr = baseOvr + data(dropTo).bonus;
      addHistory('fail', '+' + oldLevel + ' → +' + nextLv + ' 失败  |  降至 +' + dropTo + '  (OVR ' + dropOvr + ')');
      currentLevel = dropTo;
    } else {
      addHistory('fail', '+' + oldLevel + ' → +' + nextLv + ' 失败  |  强化等级保护生效，保持 +' + oldLevel);
      dropTo = oldLevel;
    }

    refreshAll();
    showBurstFail(oldLevel, oldOvr, nextLv, dropTo);
  }
}

function addHistory(result, desc) {
  history.unshift({ result, desc, num: totalAttempts });
  if (history.length > 500) history.length = 500;
}

// ============================================================
//  Burst Animation (强化过程动画)
// ============================================================
let burstTimer = null;
let burstShakeTimer = null;
let burstShakeTimeout = null;
let burstRafId = null;

function getCardImgUrl() {
  const avatar = document.getElementById('playerAvatar');
  const img = avatar.querySelector('img');
  return img ? img.src : '';
}

function showBurstOverlay() {
  // Clear any stale timers from previous runs
  if (burstTimer) { clearTimeout(burstTimer); burstTimer = null; }
  if (burstShakeTimeout) { clearTimeout(burstShakeTimeout); burstShakeTimeout = null; }
  if (burstShakeTimer) { clearInterval(burstShakeTimer); burstShakeTimer = null; }
  if (burstRafId) { cancelAnimationFrame(burstRafId); burstRafId = null; }

  var overlay = document.getElementById('burstOverlay');
  var burstCard = document.getElementById('burstCard');
  var burstCardWrap = burstCard.parentElement; // .burst-card-wrap
  var cardImg = document.getElementById('burstCardImg');
  var rain = document.getElementById('burstRain');
  var particles = document.getElementById('burstParticles');
  var shatter = document.getElementById('shatterEffect');

  // Reset
  overlay.classList.add('show');
  burstCardWrap.classList.remove('zoom-in');
  void burstCardWrap.offsetWidth;
  burstCardWrap.classList.add('zoom-in');
  burstCard.classList.remove('shake-s1', 'shake-s2', 'shake-s3', 'shake-s4', 'purple-shadow');
  burstCard.style.filter = 'brightness(1)';
  shatter.classList.remove('animate');
  shatter.style.display = 'none';
  rain.innerHTML = '';
  particles.innerHTML = '';

  // Set card image
  cardImg.src = getCardImgUrl();

  // Spotlight + glow at 60%, beams at 40%
  document.querySelectorAll('.burst-spotlight, .burst-spot-glow').forEach(function(el) {
    el.classList.add('on');
    el.style.opacity = '0.6';
  });
  document.querySelectorAll('.burst-beam').forEach(function(el) {
    el.classList.add('on');
    el.style.opacity = '0.4';
  });

  // Rain particles
  startRain(rain, 30);

  // Shake + brightness via requestAnimationFrame (synced to refresh rate)
  var shakeStartTime = null;
  var shakeDuration = 2100; // shake runs for 2100ms
  var spotShown = false;
  var lastClass = '';
  var finished = false;

  burstShakeTimeout = setTimeout(function() {
    burstShakeTimeout = null;
    shakeStartTime = performance.now();

    function tick(now) {
      // Safety: stop if overlay was hidden externally
      if (finished || !overlay.classList.contains('show')) {
        burstRafId = null;
        return;
      }

      var elapsed = now - shakeStartTime;
      var t = Math.min(elapsed / shakeDuration, 1);

      // CSS class switching for shake speed (GPU-composited, smooth)
      var newClass;
      if (t < 0.25) { newClass = 'shake-s1'; }
      else if (t < 0.55) { newClass = 'shake-s2'; }
      else if (t < 0.80) { newClass = 'shake-s3'; }
      else { newClass = 'shake-s4'; }
      if (newClass !== lastClass) {
        burstCard.classList.remove('shake-s1', 'shake-s2', 'shake-s3', 'shake-s4');
        burstCard.classList.add(newClass);
        lastClass = newClass;
      }

      // Brightness buildup: cubic curve for dramatic end flash
      var bv = 1 + t * t * t * 3.5;
      var ct = 1 + t * t * 0.2;
      var sat = 1 + t * t * 0.4;
      var glowSize = t * t * 35;
      var glowAlpha = Math.min(t * t * 1.3, 0.9);
      burstCard.style.filter = 'brightness(' + bv.toFixed(2) + ') contrast(' + ct.toFixed(2) + ') saturate(' + sat.toFixed(2) + ') drop-shadow(0 0 ' + glowSize.toFixed(0) + 'px rgba(255,255,255,' + glowAlpha.toFixed(2) + '))';

      // Spotlight + beams at 50%, particles at 50%, purple at 65%
      if (t >= 0.5 && !spotShown) {
        spotShown = true;
        document.querySelectorAll('.burst-spotlight, .burst-spot-glow').forEach(function(el) { el.style.opacity = '1'; });
        document.querySelectorAll('.burst-beam').forEach(function(el) { el.style.opacity = '1'; });
        startBurstParticles(particles, burstCard);
      }
      if (t >= 0.65) {
        burstCard.classList.add('purple-shadow');
      }

      if (t < 1) {
        burstRafId = requestAnimationFrame(tick);
      } else {
        // Animation complete — call finishBurstOverlay from here, no race condition
        burstRafId = null;
        finished = true;
        finishBurstOverlay();
      }
    }

    burstRafId = requestAnimationFrame(tick);
  }, 300);
}

function finishBurstOverlay() {
  if (burstTimer) { clearTimeout(burstTimer); burstTimer = null; }
  if (burstShakeTimeout) { clearTimeout(burstShakeTimeout); burstShakeTimeout = null; }
  if (burstShakeTimer) { clearInterval(burstShakeTimer); burstShakeTimer = null; }
  if (burstRafId) { cancelAnimationFrame(burstRafId); burstRafId = null; }

  var burstCard = document.getElementById('burstCard');
  var rain = document.getElementById('burstRain');
  var particles = document.getElementById('burstParticles');

  // Fade out lights
  document.querySelectorAll('.burst-spotlight, .burst-spot-glow').forEach(function(el) { el.style.opacity = '0'; });
  document.querySelectorAll('.burst-beam').forEach(function(el) { el.style.opacity = '0'; });

  // Force-stop CSS animation before removing classes (prevents infinite-animation stuck bug)
  burstCard.classList.add('anim-stop');
  void burstCard.offsetWidth; // force reflow to apply anim-stop
  burstCard.classList.remove('shake-s1', 'shake-s2', 'shake-s3', 'shake-s4', 'purple-shadow', 'anim-stop');
  rain.innerHTML = '';
  particles.innerHTML = '';

  // Keep burst overlay visible during transition to result
  try { executeEnhance(); }
  catch(e) {
    console.error('Enhance error:', e);
    burstCard.style.filter = '';
    document.getElementById('burstOverlay').classList.remove('show');
    if (isEnhancing) { hideAllOverlays(); resetEnhanceBtn(); }
  }
}

function skipBurst() {
  if (burstTimer) { clearTimeout(burstTimer); burstTimer = null; }
  if (burstShakeTimeout) { clearTimeout(burstShakeTimeout); burstShakeTimeout = null; }
  if (burstShakeTimer) { clearInterval(burstShakeTimer); burstShakeTimer = null; }
  if (burstRafId) { cancelAnimationFrame(burstRafId); burstRafId = null; }
  finishBurstOverlay();
}

function startRain(container, count) {
  for (var i = 0; i < count; i++) {
    var drop = document.createElement('div');
    drop.className = 'rain-particle';
    var h = 30 + Math.random() * 50;
    drop.style.height = h + 'px';
    drop.style.left = Math.random() * 100 + '%';
    drop.style.top = '-' + h + 'px';
    drop.style.opacity = (0.3 + Math.random() * 0.5);
    drop.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    drop.style.animationDelay = Math.random() * 0.4 + 's';
    container.appendChild(drop);
    setTimeout(function() { drop.remove(); }, 2500);
  }
}

function startBurstParticles(container, cardEl) {
  var rect = cardEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var count = 40;
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'burst-particle';
    var size = 2 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    var angle = Math.random() * Math.PI * 2;
    var dist = 30 + Math.random() * 140;
    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
    p.style.animationDuration = (0.5 + Math.random() * 0.8) + 's';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    container.appendChild(p);
    setTimeout(function() { p.remove(); }, 1500);
  }
}

function startSmoke(container, cardEl) {
  var rect = cardEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var count = 18;
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'smoke-particle';
    var size = 10 + Math.random() * 30;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.setProperty('--sx', (Math.random() - 0.5) * 120 + 'px');
    p.style.setProperty('--sy', -(40 + Math.random() * 100) + 'px');
    p.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(p);
    setTimeout(function() { p.remove(); }, 2000);
  }
}

function showBurstSuccess(level, oldOvr, newOvr) {
  var resultOverlay = document.getElementById('resultOverlay');
  var resultCardImg = document.getElementById('resultCardImg');
  var title = document.getElementById('resultTitle');
  var subtitle = document.getElementById('resultSubtitle');
  var stats = document.getElementById('resultStats');
  var textWrap = document.getElementById('resultTextWrap');

  resultOverlay.className = 'result-overlay success';
  resultCardImg.src = getCardImgUrl();
  stats.classList.remove('fade-in');
  textWrap.classList.remove('expand');

  title.textContent = '强化成功！';
  subtitle.textContent = '球员提升至 +' + level;

  var ovrGain = newOvr - oldOvr;
  stats.innerHTML = '<div class="rs-row"><span class="rs-label">强化等级</span><span class="rs-value">+' + level + '</span></div>' +
    '<div class="rs-row"><span class="rs-label">OVR</span><span class="rs-value">' + oldOvr + ' → ' + newOvr + ' (+' + ovrGain + ')</span></div>' +
    '<div class="rs-row"><span class="rs-label">累计成功</span><span class="rs-value">' + totalSuccess + ' / ' + totalAttempts + ' 次</span></div>';

  resultOverlay.classList.add('show');
  // Hide burst overlay after result card starts rising
  setTimeout(function() {
    document.getElementById('burstOverlay').classList.remove('show');
    document.getElementById('burstCard').style.filter = '';
  }, 400);
  setTimeout(function() { textWrap.classList.add('expand'); }, 800);
  setTimeout(function() { stats.classList.add('fade-in'); }, 1100);
}

function showBurstFail(oldLevel, oldOvr, targetLv, dropTo) {
  var resultOverlay = document.getElementById('resultOverlay');
  var resultCardImg = document.getElementById('resultCardImg');
  var title = document.getElementById('resultTitle');
  var subtitle = document.getElementById('resultSubtitle');
  var stats = document.getElementById('resultStats');
  var textWrap = document.getElementById('resultTextWrap');
  var shatter = document.getElementById('shatterEffect');
  var burstCard = document.getElementById('burstCard');
  var particles = document.getElementById('burstParticles');

  resultOverlay.className = 'result-overlay fail';
  resultCardImg.src = getCardImgUrl();
  stats.classList.remove('fade-in');
  textWrap.classList.remove('expand');

  // Shatter + smoke on burst card
  shatter.style.display = 'none';
  shatter.classList.remove('animate');
  void shatter.offsetWidth;
  shatter.style.display = 'block';
  shatter.classList.add('animate');

  startSmoke(particles, burstCard);

  // After shatter (800ms), show result
  setTimeout(function() {
    document.getElementById('burstOverlay').classList.remove('show');
    burstCard.style.filter = '';
    burstCard.classList.add('anim-stop');
    void burstCard.offsetWidth;
    burstCard.classList.remove('shake-s1', 'shake-s2', 'shake-s3', 'shake-s4', 'anim-stop');
    shatter.classList.remove('animate');
    shatter.style.display = 'none';

    resultOverlay.classList.add('show');

    var dropOvr = baseOvr + data(dropTo).bonus;
    var lostLevels = oldLevel - dropTo;

    if (dropTo === oldLevel) {
      title.textContent = '强化保护生效！';
      subtitle.textContent = '强化失败，但等级保持不变';
      stats.innerHTML = '<div class="rs-row"><span class="rs-label">强化结果</span><span class="rs-value">+' + oldLevel + ' → +' + targetLv + ' 失败</span></div>' +
        '<div class="rs-row"><span class="rs-label">保护效果</span><span class="rs-value" style="color:#f0b90b;">保持 +' + oldLevel + '</span></div>' +
        '<div class="rs-row"><span class="rs-label">OVR</span><span class="rs-value">' + oldOvr + ' (不变)</span></div>';
    } else {
      title.textContent = '强化失败';
      subtitle.textContent = '球员降至 +' + dropTo + '，掉了 ' + lostLevels + ' 级';
      stats.innerHTML = '<div class="rs-row"><span class="rs-label">强化结果</span><span class="rs-value" style="color:#e74c3c;">+' + oldLevel + ' → +' + targetLv + ' 失败</span></div>' +
        '<div class="rs-row"><span class="rs-label">降至</span><span class="rs-value" style="color:#e74c3c;">+' + dropTo + ' (掉' + lostLevels + '级)</span></div>' +
        '<div class="rs-row"><span class="rs-label">OVR</span><span class="rs-value">' + oldOvr + ' → ' + dropOvr + '</span></div>';
    }

    setTimeout(function() { textWrap.classList.add('expand'); }, 800);
    setTimeout(function() { stats.classList.add('fade-in'); }, 1100);
  }, 800);
}

let rateTooltipEl = null;

function ensureTooltip() {
  if (!rateTooltipEl) {
    rateTooltipEl = document.createElement('div');
    rateTooltipEl.className = 'rate-tooltip';
    document.body.appendChild(rateTooltipEl);
  }
  return rateTooltipEl;
}

function toggleRateHelp(e) {
  e.preventDefault();
  e.stopPropagation();
  const icon = document.getElementById('rateHelpIcon');
  const tip = ensureTooltip();
  const isShowing = tip.classList.contains('show');

  // Close all rate tooltips first
  tip.classList.remove('show');

  if (!isShowing) {
    tip.textContent = icon.getAttribute('title');
    const rect = icon.getBoundingClientRect();
    tip.style.position = 'fixed';
    tip.style.bottom = 'auto';
    tip.style.right = 'auto';
    tip.style.top = (rect.top - 10) + 'px';
    tip.style.left = Math.max(10, rect.right - 300) + 'px';
    tip.classList.add('show');
    setTimeout(() => {
      const closeHandler = function(ev) {
        if (!tip.contains(ev.target) && ev.target !== icon) {
          tip.classList.remove('show');
          document.removeEventListener('click', closeHandler);
          document.removeEventListener('touchstart', closeHandler);
        }
      };
      document.addEventListener('click', closeHandler);
      document.addEventListener('touchstart', closeHandler);
    }, 10);
  }
}

// ============================================================
//  Success stat tooltip — scrollable list, all records
// ============================================================
let successTipEl = null;

function toggleSuccessTip(e) {
  e.preventDefault();
  e.stopPropagation();
  const box = document.getElementById('statSuccessBox');
  const successes = history.filter(h => h.result === 'success');
  if (successes.length === 0) return;

  if (!successTipEl) {
    successTipEl = document.createElement('div');
    successTipEl.className = 'success-tooltip';
    document.body.appendChild(successTipEl);
  }

  const isShowing = successTipEl.classList.contains('show');
  successTipEl.classList.remove('show');

  if (!isShowing) {
    let html = '<div class="st-list">';
    successes.forEach(s => {
      html += `<div class="st-item">${s.desc}</div>`;
    });
    html += '</div>';
    successTipEl.innerHTML = html;
    const rect = box.getBoundingClientRect();
    successTipEl.style.top = Math.max(10, rect.top - 10) + 'px';
    successTipEl.style.left = Math.max(10, rect.right - 220) + 'px';
    successTipEl.classList.add('show');
    setTimeout(() => {
      const closeHandler = function(ev) {
        if (!successTipEl.contains(ev.target) && ev.target !== box) {
          successTipEl.classList.remove('show');
          document.removeEventListener('click', closeHandler);
          document.removeEventListener('touchstart', closeHandler);
        }
      };
      document.addEventListener('click', closeHandler);
      document.addEventListener('touchstart', closeHandler);
    }, 10);
  }
}

//  Particles
// ============================================================
function spawnParticles(type) {
  const layer = document.getElementById('particleLayer');
  const card = document.getElementById('playerCard');
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const isMobile = window.innerWidth < 480;
  const count = type === 'success' ? (isMobile ? 14 : 28) : (isMobile ? 6 : 12);
  const icons = type === 'success'
    ? ['⭐','✨','🔥','💪','⚡','🏆','💎']
    : ['❌','😢','💨'];

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'pt';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    const a = Math.random() * Math.PI * 2;
    const d = 50 + Math.random() * 140;
    el.style.setProperty('--dx', Math.cos(a) * d + 'px');
    el.style.setProperty('--dy', Math.sin(a) * d + 'px');
    el.style.animationDuration = (0.3 + Math.random() * 0.5) + 's';
    layer.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
}

// Sync the player select dropdown with current player
function syncPlayerSelect() {
  const sel = document.getElementById('inpPlayerSelect');
  const match = PLAYER_DB.find(p => p.name === playerName);
  if (match) {
    sel.value = match.name;
  } else {
    sel.value = '';
  }
}

function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings(e) {
  if (e && e.target !== document.getElementById('settingsOverlay')) return;
  document.getElementById('settingsOverlay').classList.remove('show');
}

function closeSettingsDirect() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function applySettings() {
  const name = document.getElementById('inpName').value.trim() || 'Unknown Player';
  const season = document.getElementById('inpSeason').value;
  const pos = document.getElementById('inpPos').value.trim() || 'ST';
  const ovr = parseInt(document.getElementById('inpOvr').value) || 89;
  const lv = parseInt(document.getElementById('inpLevel').value) || 0;

  playerName = name;
  playerSeason = season;
  playerPos = pos;
  baseOvr = Math.max(40, Math.min(150, ovr));
  currentLevel = Math.max(1, Math.min(13, lv));

  // Reset stats when changing player
  totalAttempts = 0;
  totalSuccess = 0;
  history = [];
  if (autoMode) stopAuto();

  // Update form fields
  document.getElementById('inpName').value = playerName;
  document.getElementById('inpSeason').value = playerSeason;
  document.getElementById('inpPos').value = playerPos;
  document.getElementById('inpOvr').value = baseOvr;
  document.getElementById('inpLevel').value = currentLevel;
  document.getElementById('inpStopLevel').value = stopLevel;
  document.getElementById('inpMaterialOvr').value = baseOvr;
  clearMaterials();
  // Sync player select dropdown
  syncPlayerSelect();

  // Close settings modal
  closeSettingsDirect();

  refreshAll();
}

//  Stop Level Input
// ============================================================
document.getElementById('inpStopLevel').addEventListener('input', function() {
  stopLevel = Math.max(1, Math.min(13, parseInt(this.value) || 13));
  this.value = stopLevel;
  document.getElementById('stopLevelDisplay').textContent = '+' + stopLevel;
});

//  Keyboard
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!isEnhancing && canEnhance()) startEnhance();
  }
  if (e.code === 'KeyA') {
    e.preventDefault();
    toggleAuto();
  }
});
