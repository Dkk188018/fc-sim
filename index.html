body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: rgba(0,0,0,0.3);
}

button,input,select,textarea,[onclick],.energy-slot,.stat-box.clickable,.settings-trigger,.btn {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.app { width: 560px; max-width: 100vw; padding: 0 14px; }

/* ===== Header ===== */
.header { text-align: center; margin-bottom: 4px; }
.header h1 {
  font-size: 18px; font-weight: 900; letter-spacing: 1px;
  background: linear-gradient(135deg,#f0b90b 0%,#ffd54f 40%,#ffab00 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* ===== Settings Trigger ===== */
.settings-trigger {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--gold); cursor: pointer;
  padding: 4px 10px; margin-bottom: 6px;
  border: 1px solid rgba(240,185,11,0.3); border-radius: 14px;
  user-select: none; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Settings Modal ===== */
.settings-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75);
  justify-content: center; align-items: center;
  padding: 20px;
}
.settings-overlay.show { display: flex; }
.settings-modal {
  background: #fff; border: 1px solid #d0d5dd;
  border-radius: 12px; padding: 20px; width: 100%; max-width: 440px;
  max-height: 85vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: modalIn 0.25s ease-out;
  color: #1a1a1a;
}
@keyframes modalIn {
  0% { opacity: 0; transform: translateY(20px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.settings-modal .field { margin-bottom: 10px; }
.settings-modal label {
  display: block; font-size: 11px; color: #555;
  margin-bottom: 4px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.settings-modal input, .settings-modal select {
  width: 100%; padding: 8px 12px;
  background: #f5f6f8; border: 1px solid #d0d5dd; border-radius: 6px;
  color: #1a1a1a; font-size: 14px; font-family: inherit; outline: none;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.settings-modal input:focus, .settings-modal select:focus { border-color: #2979ff; }
.settings-modal .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.settings-modal .btn-row { display: flex; gap: 8px; margin-top: 14px; }
.settings-modal .btn-row button { flex: 1; }
.settings-modal .btn-secondary {
  background: #e8eaed; color: #333;
  border: 1px solid #c0c5cc; font-size: 13px; font-weight: 600;
}
.settings-modal .btn-secondary:hover { background: #d0d5dd; }
.settings-modal .btn-main {
  background: #2979ff; color: #fff;
  border: none; font-size: 13px; font-weight: 700;
}
.settings-modal .btn-main:hover { background: #1c6ae8; }

/* ===== Player Card ===== */
.player-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; margin-bottom: 6px;
}
.player-face {
  width: 72px; height: 72px; border-radius: 8px; flex-shrink: 0;
  background: rgba(20,30,50,0.6); border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: rgba(255,255,255,0.15);
  overflow: hidden;
}
.player-face.has-img {
  width: 80px; height: 104px; border-radius: 6px;
  background: transparent; border: 1px solid rgba(255,255,255,0.2);
}
.player-info { flex: 1; min-width: 0; }
.player-info .season-badge {
  display: inline-block; background: #2979ff; color: #fff;
  font-size: 13px; font-weight: 900; padding: 1px 7px; border-radius: 3px;
  letter-spacing: 0.5px; margin-bottom: 2px;
}
.player-info .player-name {
  font-size: 15px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-info .player-pos {
  font-size: 11px; color: var(--text3);
}
.player-info .trait-row {
  display: flex; gap: 3px; margin-top: 3px;
}
.player-info .trait-dot {
  width: 10px; height: 10px; border-radius: 2px;
  background: rgba(255,255,255,0.08);
}
.player-info .trait-dot.on { background: rgba(240,185,11,0.6); }
.player-info .player-value {
  font-size: 10px; color: var(--text3); margin-top: 2px;
}
.player-right { text-align: right; flex-shrink: 0; }
.player-right .player-ovr {
  font-size: 36px; font-weight: 900; line-height: 1;
  background: linear-gradient(180deg,#fff 0%,#b0c0d8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.player-right .enhance-badge {
  display: inline-block; font-size: 13px; font-weight: 700;
  padding: 1px 8px; border-radius: 3px; margin-top: 2px;
}
.player-right .enhance-badge.low { color: #fff; background: rgba(255,255,255,0.15); }
.player-right .enhance-badge.mid { color: #f0b90b; background: rgba(240,185,11,0.2); border: 1px solid rgba(240,185,11,0.3); }
.player-right .enhance-badge.high { color: #ff6d00; background: rgba(255,109,0,0.2); border: 1px solid rgba(255,109,0,0.3); }
.player-right .enhance-badge.ult { color: #ff1744; background: rgba(255,23,68,0.2); border: 1px solid rgba(255,23,68,0.3); animation: badgeGlow 1.5s ease-in-out infinite; }
@keyframes badgeGlow {
  0%,100% { box-shadow: 0 0 6px rgba(255,23,68,0.3); }
  50% { box-shadow: 0 0 14px rgba(255,23,68,0.6); }
}

/* ===== Progress Bar ===== */
.progress-section { margin-bottom: 6px; }
.progress-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px; font-size: 11px;
}
.progress-title { color: var(--text2); font-weight: 600; }
.progress-rate { color: var(--text3); }
.progress-rate strong { color: #fff; }
.progress-bar {
  display: flex; align-items: center; gap: 2px; overflow: hidden;
}
.progress-step {
  width: 26px; height: 26px; min-width: 16px;
  border-radius: 5px;
  background: rgba(20,30,50,0.5);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #5a6070;
  transition: all 0.35s; flex-shrink: 1;
}
.progress-step.reached {
  background: rgba(0,200,83,0.15); border-color: rgba(0,200,83,0.3);
  color: #6aaa70;
}
.progress-step.current {
  background: linear-gradient(135deg,#6a3808,#4a2804);
  border-color: #f0b90b; color: #fff;
  box-shadow: 0 0 10px rgba(240,185,11,0.35);
  animation: stepPulse 0.6s ease-in-out infinite;
  transform: scale(1.1); z-index: 1;
}
@keyframes stepPulse {
  0%,100% { box-shadow: 0 0 10px rgba(240,185,11,0.35); }
  50% { box-shadow: 0 0 18px rgba(240,185,11,0.55); }
}
.progress-arrow { font-size: 10px; color: rgba(255,255,255,0.1); flex-shrink: 0; margin: 0 1px; }
@media (max-width: 480px) {
  .progress-bar { gap: 0; }
  .progress-step { width: 18px; height: 18px; min-width: 14px; font-size: 7px; border-radius: 3px; }
  .progress-arrow { font-size: 7px; flex-shrink: 1; margin: 0; }
}

/* ===== Info Chips ===== */
.info-row { display: flex; gap: 6px; margin-bottom: 6px; }
.info-chip { flex: 1; text-align: center; padding: 6px 4px; }
.info-chip .val { font-size: 14px; font-weight: 700; color: #fff; }
.info-chip .val.gold { color: var(--gold); }
.info-chip .val.green { color: var(--success); }
.info-chip .val.red { color: var(--fail); }
.info-chip .lbl { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* ===== Protection ===== */
.protect-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text2); margin-bottom: 6px;
  gap: 10px;
}
.protect-badge {
  font-size: 10px; background: rgba(240,185,11,0.15);
  color: var(--gold); padding: 1px 6px; border-radius: 3px; font-weight: 600;
}

/* ===== Material Slots ===== */
.material-section { margin-bottom: 6px; }
.material-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 5px; font-size: 11px;
}
.material-header .title { color: var(--text2); font-weight: 600; }
.material-header .boost { color: var(--accent); font-weight: 600; }
.energy-slots { display: flex; gap: 5px; margin-bottom: 5px; }
.energy-slot {
  flex: 1; height: 30px; border-radius: 5px;
  background: rgba(20,30,50,0.5); border: 2px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.energy-slot::before {
  content: attr(data-slot);
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #000;
  z-index: 2; pointer-events: none;
}
.energy-slot.filled::before { color: #000; }
.energy-slot .fill {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,#5bb8ff 0%,#3a9aee 100%);
  transition: width 0.3s ease; border-radius: 3px;
}
.energy-slot.filled {
  border-color: #5bb8ff;
  box-shadow: 0 0 6px rgba(91,184,255,0.3);
}

/* ===== Buttons ===== */
.btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
.btn {
  padding: 10px 16px; border-radius: 6px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; letter-spacing: 0.5px;
  user-select: none; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.btn-main {
  flex: 1;
  background: linear-gradient(180deg,#f0b90b 0%,#d4a00a 40%,#a07808 100%);
  color: #1a0a00; font-size: 18px; letter-spacing: 3px;
  box-shadow: 0 4px 16px rgba(240,185,11,0.3);
  position: relative; overflow: hidden;
}
.btn-main:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(240,185,11,0.45); }
.btn-main:active:not(:disabled) { transform: translateY(1px); }
.btn-main.charging {
  animation: btnCharge 0.2s ease-in-out infinite;
  background: linear-gradient(180deg,#ffcc00 0%,#f0b90b 40%,#c8900a 100%);
}
@keyframes btnCharge {
  0%,100% { box-shadow: 0 4px 16px rgba(240,185,11,0.3); }
  50% { box-shadow: 0 4px 32px rgba(240,185,11,0.7),0 0 60px rgba(240,185,11,0.3); }
}
.btn-secondary {
  background: rgba(255,255,255,0.08); color: var(--text2);
  font-size: 12px; border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.14); color: #fff; }
.btn-secondary.active { background: rgba(41,121,255,0.2); border-color: var(--accent); color: #aaccff; }

/* ===== Stats ===== */
.stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 4px; margin-bottom: 4px;
}
.stat-box { text-align: center; padding: 6px 4px; }
.stat-box .num { font-size: 17px; font-weight: 700; color: #fff; }
.stat-box .num.g { color: var(--gold); }
.stat-box .num.s { color: var(--success); }
.stat-box .num.f { color: var(--fail); }
.stat-box .tag { font-size: 9px; color: var(--text3); margin-top: 1px; }
.stat-box.clickable { cursor: pointer; position: relative; touch-action: manipulation; }

/* ===== History ===== */
.history-box {
  max-height: 150px; overflow-y: scroll;
  -webkit-overflow-scrolling: touch; overscroll-behavior: auto;
  scroll-behavior: smooth; will-change: scroll-position;
  padding-right: 4px;
  touch-action: pan-y; -webkit-user-select: text;
  pointer-events: auto;
}
.history-box::-webkit-scrollbar { width: 3px; }
.history-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.history-title { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
.history-list { list-style: none; }
.history-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 2px; font-size: 11px;
}
.hist-num { color: var(--text3); font-size: 9px; min-width: 20px; }
.hist-tag { font-weight: 700; padding: 0px 5px; border-radius: 2px; font-size: 9px; flex-shrink: 0; }
.hist-tag.win { background: rgba(0,200,83,0.15); color: var(--success); }
.hist-tag.lose { background: rgba(229,57,53,0.12); color: var(--fail); }
.hist-detail { color: var(--text2); flex: 1; }
.hist-empty { color: var(--text3); text-align: center; padding: 16px; font-size: 11px; }

/* ===== Hint ===== */
.hint { text-align: center; font-size: 9px; color: var(--text3); margin-top: 6px; }
.hint kbd {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 2px; padding: 0px 4px; font-size: 9px; font-family: inherit;
}

/* ===== Rate help icon ===== */
.rate-help {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
  font-size: 9px; font-weight: 700; cursor: pointer;
  vertical-align: middle; margin-left: 2px;
  touch-action: manipulation; user-select: none; position: relative;
}
.rate-help:hover,.rate-help.active { background: #f0b90b; color: #000; }
.rate-tooltip {
  display: none; position: fixed;
  background: #0a0a0a; color: #ddd; font-size: 11px; font-weight: 400;
  line-height: 1.6; padding: 10px 14px; border-radius: 8px;
  border: 1px solid #3a4860; white-space: pre-line;
  min-width: 260px; max-width: 320px; z-index: 600;
  pointer-events: auto; cursor: default;
}
.rate-tooltip.show { display: block; animation: fadeIn 0.15s ease-out; }
@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ===== Player Card Animations ===== */
.player-card.success-glow { box-shadow: 0 0 24px rgba(0,200,83,0.5); }
.player-card.enhance-flash { animation: cardFlash 0.1s ease-in-out 3; }
@keyframes cardFlash {
  0%,100% { box-shadow: none; }
  50% { box-shadow: 0 0 16px rgba(240,185,11,0.3); }
}
.player-card.fail-shake { animation: shake 0.3s ease-out; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  30% { transform: translateX(8px); }
  45% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  75% { transform: translateX(-3px); }
  90% { transform: translateX(3px); }
}

/* ===== Modal (Result) ===== */
.result-overlay {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.7);
  justify-content: center; align-items: center;
}
.result-overlay.show { display: flex; }
.result-modal {
  background: #1a1f2e; border: 1px solid #3a4560;
  border-radius: 12px; padding: 16px 18px; text-align: center;
  width: auto; max-width: 220px !important;
  word-break: break-all; overflow-wrap: break-word;
  animation: modalPop 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  will-change: transform,opacity;
}
@keyframes modalPop {
  0% { transform: scale(0.8) translateY(30px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.result-modal .icon { font-size: 28px; margin-bottom: 4px; }
.result-modal .title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.result-modal .title.win { color: var(--gold); }
.result-modal .title.lose { color: var(--fail); }
.result-modal .lv { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
.result-modal .ovr-change { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 2px; }
.result-modal .ovr-change.down { color: var(--fail); }
.result-modal .detail { font-size: 10px; color: var(--text3); margin-bottom: 8px; }
.result-modal .btn-close {
  background: rgba(255,255,255,0.1); color: var(--text2);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
  padding: 6px 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  touch-action: manipulation;
}
.result-modal .btn-close:hover { background: rgba(255,255,255,0.18); color: #fff; }

/* ===== Particles ===== */
.particle-layer { position: fixed; inset: 0; pointer-events: none; z-index: 250; }
.pt {
  position: absolute; font-size: 22px;
  animation: ptFly 0.6s ease-out forwards;
  will-change: transform,opacity;
}
@keyframes ptFly {
  0% { opacity: 1; transform: translate(0,0) scale(1.2); }
  100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
}

/* ===== Material Input ===== */
.mat-input-row { display: flex; gap: 5px; align-items: center; margin-bottom: 6px; }
.mat-input-row input {
  width: 52px; padding: 5px 6px;
  background: rgba(20,30,50,0.5); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; color: var(--text); font-size: 12px;
  text-align: center; font-family: inherit; outline: none;
}
.mat-input-row .mat-btn {
  background: rgba(255,255,255,0.06); color: var(--text2);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
  padding: 5px 10px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}

/* ===== Stop Level ===== */
.stop-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text2); margin-bottom: 6px;
}
.stop-row input {
  width: 44px; padding: 5px 6px;
  background: rgba(20,30,50,0.5); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; color: var(--text); font-size: 13px;
  text-align: center; font-family: inherit; outline: none;
}
</style>

<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>FC Online 4 强化模拟器 <span style="font-size:9px;color:#ff6d00;vertical-align:super;">v5.22</span></h1>
  </div>

  <!-- Settings Trigger -->
  <span class="settings-trigger" onclick="openSettings()">⚙ 球员设置</span>

  <!-- Settings Modal -->
  <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
    <div class="settings-modal" onclick="event.stopPropagation()">
      <div class="field">
        <label>快速选择球员 — 25UCL 赛季</label>
        <select id="inpPlayerSelect" onchange="onPlayerSelect()">
          <option value="">— 自定义球员 —</option>
        </select>
      </div>
      <div class="field">
        <label>球员名称</label>
        <input type="text" id="inpName" value="姆巴佩" placeholder="输入球员名称">
      </div>
      <div class="field-row">
        <div class="field">
          <label>赛季 / 卡种</label>
          <select id="inpSeason">
            <option value="default">基础卡 (普通)</option>
            <option value="live">LIVE 实时</option>
            <option value="hot">HOT 焦点</option>
            <option value="tots">TOTS 赛季最佳</option>
            <option value="toty">TOTY 年度最佳</option>
            <option value="icon">ICON 传奇</option>
            <option value="icon-tm">ICON TM 传奇时刻</option>
            <option value="wc">WC 世界杯</option>
            <option value="ucl">UCL 欧冠</option>
            <option value="25ucl" selected>25UCL 25欧冠</option>
            <option value="ng">NG 新星</option>
            <option value="cap">CAP 队长</option>
          </select>

          <label>当前强化等级</label>
          <select id="inpLevel">
            <option value="1">+1</option><option value="2">+2</option><option value="3">+3</option><option value="4">+4</option><option value="5">+5</option><option value="6">+6</option><option value="7">+7</option><option value="8">+8</option><option value="9">+9</option><option value="10">+10</option><option value="11">+11</option><option value="12">+12</option><option value="13">+13</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeSettingsDirect()">取消</button>
        <button class="btn btn-main" style="font-size:14px;letter-spacing:1px;" onclick="applySettings()">应用设置</button>
      </div>
    </div>
  </div>

  <!-- Player Card -->
  <div class="player-card" id="playerCard">
    <div class="player-face" id="playerAvatar">⚽</div>
    <div class="player-info">
      <span class="season-badge" id="playerSeason">25UCL</span>
      <div class="player-name" id="playerName">Cristiano Ronaldo</div>

      <div class="trait-row" id="traitSlots"></div>
      <div class="player-value" id="estValue">--</div>
    </div>

      <div class="enhance-badge low" id="enhanceBadge">+0</div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">强化进度</span>
      <span class="progress-rate" id="rateInfo">点击强化按钮开始</span>
    </div>
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Info Chips -->
  <div class="info-row">
    <div class="info-chip">
      <div class="val" id="infoNextLevel">+1</div>
      <div class="lbl">目标等级</div>
    </div>
    <div class="info-chip">
      <div class="val gold" id="infoRate">100%</div>
      <div class="lbl">成功率</div>
    </div>
    <div class="info-chip">
      <div class="val green" id="infoOvrGain">+0</div>
      <div class="lbl">单级OVR提升</div>
    </div>
    <div class="info-chip">
      <div class="val" id="infoTargetOvr">89</div>
      <div class="lbl">成功后能力值</div>
    </div>
  </div>

  <!-- Protection -->
  <div class="protect-row">
    <span style="font-weight:600;">强化等级保护</span>

function populatePlayerSelect() {
  const sel = document.getElementById('inpPlayerSelect');
  // Keep the first "custom" option
  sel.innerHTML = '<option value="">— 自定义球员 —</option>';
  // Group by position
  const positions = [...new Set(PLAYER_DB.map(p => p.position))];
  positions.sort();
  positions.forEach(pos => {
    const group = document.createElement('optgroup');
    group.label = pos;
    const players = PLAYER_DB.filter(p => p.position === pos);
    players.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name + ' · OVR ' + p.ovr + ' · 周薪' + p.salary + '万';
      opt.dataset.position = p.position;
      opt.dataset.ovr = p.ovr;
      opt.dataset.salary = p.salary;
      opt.dataset.enhance = p.enhance;
      group.appendChild(opt);
    });
    sel.appendChild(group);
  });
}

function onPlayerSelect() {
  const sel = document.getElementById('inpPlayerSelect');
  const name = sel.value;
  if (!name) return; // "自定义" option
  const opt = sel.selectedOptions[0];
  document.getElementById('inpName').value = name;
  document.getElementById('inpPos').value = opt.dataset.position;
  document.getElementById('inpOvr').value = opt.dataset.ovr;
  document.getElementById('inpLevel').value = opt.dataset.enhance;
  document.getElementById('inpSeason').value = '25ucl';
  // Don't auto-apply — user must click 应用设置
}

// ============================================================
//  Material Card Energy Bar
// ============================================================
function addMaterial() {
  if (materialCards.length >= 5) return;
  const inp = document.getElementById('inpMaterialOvr');
  const ovr = Math.max(40, Math.min(150, parseInt(inp.value) || baseOvr));
  inp.value = ovr;
  materialCards.push({ ovr });
  updateEnergyBar();
}

function clearMaterials() {
  materialCards = [];
  updateEnergyBar();
}

function clickSlot(n) {
  // Manual fill: clicking slot N means fill slots 1..N
  const currentFilled = Math.round(getTotalFill());
  if (currentFilled === n) {
    // Toggle off
    materialCards = [];
  } else {
    // Fill to N slots with current-OVR materials
    materialCards = [];
    for (let i = 0; i < n; i++) {
      materialCards.push({ ovr: curOvr() });
    }
  }
  updateEnergyBar();
}

function calcFillRatio(matOvr) {
  // 以球员当前实际OVR为基准（非基础OVR）
  const currentOvr = curOvr();
  const diff = matOvr - currentOvr;
  return Math.max(0.1, 1.0 + diff * 0.1);
}

function getTotalFill() {
  let total = 0;
  materialCards.forEach(m => { total += calcFillRatio(m.ovr); });
  return Math.min(total, 5);
}

function getMaterialBoost() {
  return Math.round(getTotalFill()) * 1; // 每格 +1% 成功率
}

function updateEnergyBar() {
  const totalFill = getTotalFill();
  const fullSlots = Math.floor(totalFill);
  const partialFill = totalFill - fullSlots;

  for (let i = 0; i < 5; i++) {
    const slot = document.querySelector(`.energy-slot[data-slot="${i+1}"]`);
    if (!slot) continue;
    // Clear old fill
    const oldFill = slot.querySelector('.fill');
    if (oldFill) oldFill.remove();

    if (i < fullSlots) {
      // Fully filled
      slot.classList.add('filled');
      const fill = document.createElement('div');
      fill.className = 'fill';
      fill.style.width = '100%';
      slot.appendChild(fill);
    } else if (i === fullSlots && partialFill > 0) {
      // Partially filled
      slot.classList.add('filled');
      const fill = document.createElement('div');
      fill.className = 'fill';
      fill.style.width = (partialFill * 100) + '%';
      slot.appendChild(fill);
    } else {
      // Empty
      slot.classList.remove('filled');
    }
  }

  document.getElementById('materialCount').textContent = `已填 ${materialCards.length}/5`;
  const boost = getMaterialBoost();
  document.getElementById('materialBoost').textContent = '+' + boost + '%';
}

function getFinalRate(baseRate) {
  const boost = getMaterialBoost() / 100; // convert to decimal
  return Math.min(1, baseRate + boost);
}

function data(lv) { return TABLE.find(d => d.level === lv) || TABLE[0]; }
function curOvr() { return baseOvr + data(currentLevel).bonus; }
function canEnhance() { return currentLevel < 13; }

// ============================================================
//  UI Update
// ============================================================
function refreshAll() {
  const d = data(currentLevel);
  const ovr = curOvr();
  const nextLv = currentLevel + 1;
  const canUp = canEnhance();
  const nextD = canUp ? data(nextLv) : null;

  // Player card
  document.getElementById('playerOvr').textContent = ovr;
  const badge = document.getElementById('enhanceBadge');
  badge.textContent = '+' + currentLevel;
  badge.className = 'enhance-badge';
  if (currentLevel >= 12) badge.classList.add('ult');
  else if (currentLevel >= 8) badge.classList.add('high');
  else if (currentLevel >= 4) badge.classList.add('mid');
  else badge.classList.add('low');
  document.getElementById('playerName').textContent = playerName;
  document.getElementById('playerMeta').textContent = playerPos;

  // Season badge
  const sEl = document.getElementById('playerSeason');
  const seasonNames = {
    default:'基础卡', live:'LIVE', hot:'HOT', tots:'TOTS', toty:'TOTY',
    icon:'ICON', 'icon-tm':'ICON TM', wc:'WC', ucl:'UCL', ng:'NG', cap:'CAP'
  };
  sEl.textContent = seasonNames[playerSeason] || playerSeason.toUpperCase();
  sEl.className = 'season-badge';
  if (playerSeason === 'tots') sEl.classList.add('season-tots');
  else if (playerSeason === 'toty') sEl.classList.add('season-toty');
  else if (playerSeason === 'icon' || playerSeason === 'icon-tm') sEl.classList.add('season-icon');
  else if (playerSeason === 'hot') sEl.classList.add('season-hot');
  else if (playerSeason === 'live') sEl.classList.add('season-live');
  else if (playerSeason === '25ucl') sEl.classList.add('season-25ucl');
  else sEl.classList.add('season-default');

  // Avatar — show card image from PLAYER_IMAGES if available
  const avatar = document.getElementById('playerAvatar');
  avatar.classList.remove('elite','legend','ultimate','has-img');
  const imgUrl = (typeof PLAYER_IMAGES !== 'undefined' && PLAYER_IMAGES[playerName]) ? PLAYER_IMAGES[playerName] : null;
  if (imgUrl) {
    avatar.textContent = '';
    avatar.innerHTML = `<img src="${imgUrl}" alt="${playerName}" style="width:100%;height:100%;object-fit:contain;border-radius:inherit;">`;
    avatar.classList.add('has-img');
  } else {
    avatar.innerHTML = '';
    avatar.textContent = '⚽';
  }
  if (currentLevel >= 12) avatar.classList.add('ultimate');
  else if (currentLevel >= 8) avatar.classList.add('legend');
  else if (currentLevel >= 5) avatar.classList.add('elite');

  // Trait slots (特性槽)
  const traitCount = currentLevel >= 12 ? 7 : currentLevel >= 9 ? 6 : currentLevel >= 6 ? 5 : currentLevel >= 3 ? 4 : 3;
  let traitHtml = '';
  for (let i = 0; i < 7; i++) {
    traitHtml += `<div class="trait-dot${i < traitCount ? ' on' : ''}"></div>`;
  }
  document.getElementById('traitSlots').innerHTML = traitHtml;

  // Estimated value
  const baseVal = baseOvr * baseOvr * 80;
  const lvMult = [1, 1.2, 1.5, 2, 3, 5, 8, 14, 22, 35, 55, 85, 130, 200];
  const val = Math.floor(baseVal * lvMult[currentLevel] / 10000);
  document.getElementById('estValue').textContent = '💰 预计价值: ' + (val >= 1 ? val + '万 BP' : '--');

  // Progress bar
  renderProgress();

  // Rate info
  if (!canUp) {
    document.getElementById('rateInfo').innerHTML = '<strong style="color:#f0b90b;">已满级 MAX +13</strong>';
    document.getElementById('btnEnhance').disabled = true;
    document.getElementById('btnEnhance').textContent = '已满级';
  } else {
    const effectiveRate = getFinalRate(nextD.rate);
    const r = (effectiveRate * 100);
    const rStr = r >= 1 ? r.toFixed(0) + '%' : r.toFixed(1) + '%';
    const boost = getMaterialBoost();
    const boostStr = boost > 0 ? ` <span style="color:#2979ff;font-size:11px;">(含材料+${boost}%)</span>` : '';
    document.getElementById('rateInfo').innerHTML = `+${currentLevel} → +${nextLv} 成功率 <strong>${rStr}</strong>${boostStr}`;
    document.getElementById('btnEnhance').disabled = false;
    document.getElementById('btnEnhance').textContent = '强 化';
  }

  // Info chips
  document.getElementById('infoNextLevel').textContent = canUp ? '+' + nextLv : 'MAX';
  document.getElementById('infoRate').textContent = canUp ? ((getFinalRate(nextD.rate)*100) >= 1 ? (getFinalRate(nextD.rate)*100).toFixed(0)+'%' : (getFinalRate(nextD.rate)*100).toFixed(1)+'%') : '-';
  document.getElementById('infoOvrGain').textContent = canUp ? ('+' + nextD.gain) : '-';
  document.getElementById('infoTargetOvr').textContent = canUp ? (baseOvr + nextD.bonus) : (baseOvr + d.bonus);

  // Protection slider: only available at +8 and above
  const slider = document.getElementById('protectSlider');
  const protectBadge = document.getElementById('protectBadge');
  if (slider) {
    if (currentLevel < 8) {
      slider.disabled = true;
      slider.value = 0;
      protectCount = 0;
      document.getElementById('protectCount').textContent = '0';
      if (protectBadge) protectBadge.style.display = 'none';
      if (slider.parentElement) slider.parentElement.style.opacity = '0.35';
    } else {
      slider.disabled = false;
      if (slider.parentElement) slider.parentElement.style.opacity = '1';
      if (protectBadge) {
        if (protectCount === 0) {
          protectBadge.style.display = 'inline';
          protectBadge.textContent = '推荐开启';
        } else {
          protectBadge.style.display = 'none';
        }
      }
    }
  }

  // Stats (with safety null checks)
  const sAttempts = document.getElementById('sAttempts');
  const sSuccess = document.getElementById('sSuccess');
  const sFail = document.getElementById('sFail');
  const statSuccessBox = document.getElementById('statSuccessBox');
  const stopLevelDisplay = document.getElementById('stopLevelDisplay');
  if (sAttempts) sAttempts.textContent = totalAttempts;
  if (sSuccess) sSuccess.textContent = totalSuccess;
  if (sFail) sFail.textContent = totalAttempts - totalSuccess;
  if (stopLevelDisplay) stopLevelDisplay.textContent = '+' + ((stopLevel > 13) ? 13 : stopLevel);
  // Build all-success tip
  if (statSuccessBox) {
    const successes = history.filter(h => h.result === 'success');
    let allSuccessTip = '';
    if (successes.length === 0) {
      allSuccessTip = '暂无成功记录';
    } else {
      allSuccessTip = successes.map(h => {
        const parts = h.desc.split(' | ');
        return parts[0] + '\n' + parts[parts.length - 1];
      }).join('\n———\n');
    }
    statSuccessBox.setAttribute('data-tip', allSuccessTip);
  }

  // Button state
  if (!canUp) {
    document.getElementById('btnEnhance').disabled = true;
    if (autoMode) stopAuto();
  }

  renderHistory();
}

function renderProgress() {
  const bar = document.getElementById('progressBar');
  if (!bar) return;
  let html = '';
  for (let i = 0; i <= 13; i++) {
    if (i > 0) html += '<span class="progress-arrow">›</span>';
    let cls = 'progress-step';
    if (i < currentLevel) cls += ' reached';
    if (i === currentLevel) cls += ' current';
    html += `<div class="${cls}" title="+${i}: OVR ${baseOvr + data(i).bonus}">+${i}</div>`;
  }
  bar.innerHTML = html;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!list) return;
  if (history.length === 0) {
    list.innerHTML = '<li class="hist-empty">等待首次强化...</li>';
    return;
  }
  list.innerHTML = history.map(h => {
    let tagCls, tagText;
    if (h.result === 'success') { tagCls = 'win'; tagText = '成功'; }
    else { tagCls = 'lose'; tagText = '失败'; }
    return `<li class="history-item">
      <span class="hist-num">#${h.num}</span>
      <span class="hist-tag ${tagCls}">${tagText}</span>
      <span class="hist-detail">${h.desc}</span>
    </li>`;
  }).join('');
}

// ============================================================
//  Actions
// ============================================================
function onProtectSlider() {
  const slider = document.getElementById('protectSlider');
  protectCount = parseInt(slider.value) || 0;
  document.getElementById('protectCount').textContent = protectCount;
}
function hasProtection() { return currentLevel >= 8 && protectCount > 0; }

function toggleAuto() {
  if (autoMode) { stopAuto(); } else { startAuto(); }
}

function startAuto() {
  if (!canEnhance()) return;
  autoMode = true;
  const btn = document.getElementById('btnAuto');
  btn.textContent = '停止';
  btn.classList.add('active');
  doAutoStep();
}

function stopAuto() {
  autoMode = false;
  const btn = document.getElementById('btnAuto');
  btn.textContent = '自动';
  btn.classList.remove('active');
  if (autoTimer) clearTimeout(autoTimer);
}

function doAutoStep() {
  if (!autoMode || !canEnhance()) { stopAuto(); return; }
  if (currentLevel >= stopLevel) { stopAuto(); return; }
  if (!isEnhancing) startEnhance();
  autoTimer = setTimeout(() => doAutoStep(), 1800);
}

function resetCard() {
  if (isEnhancing) return;
  if (autoMode) stopAuto();
  currentLevel = 0;
  totalAttempts = 0;
  totalSuccess = 0;
  history = [];
  stopLevel = 13;
  document.getElementById('inpStopLevel').value = 13;
  protectCount = 0;
  document.getElementById('protectSlider').value = 0;
  document.getElementById('protectCount').textContent = '0';
  clearMaterials();
  document.getElementById('inpMaterialOvr').value = baseOvr;
  refreshAll();
}

function startEnhance() {
  if (isEnhancing || !canEnhance()) return;
  isEnhancing = true;

  const btn = document.getElementById('btnEnhance');
  const card = document.getElementById('playerCard');
  btn.classList.add('charging');
  btn.textContent = '强化中...';
  btn.disabled = true;
  card.classList.add('enhance-flash');

  // Safety fallback: force-reset button after 3s no matter what
  const safetyTimer = setTimeout(() => {
    if (isEnhancing) {
      isEnhancing = false;
      btn.classList.remove('charging');
      btn.disabled = false;
      btn.textContent = '强 化';
      card.classList.remove('enhance-flash');
    }
  }, 3000);

  setTimeout(() => {
    try {
      executeEnhance();
    } catch(e) {
      console.error('Enhance error:', e);
    }
    clearTimeout(safetyTimer);
    isEnhancing = false;
    btn.classList.remove('charging');
    btn.disabled = false;
    btn.textContent = '强 化';
    card.classList.remove('enhance-flash');
  }, 1300);
}

function executeEnhance() {
  const nextLv = currentLevel + 1;
  const nextD = data(nextLv);
  const rate = getFinalRate(nextD.rate);
  const roll = Math.random();
  const success = roll < rate;

  totalAttempts++;

  if (success) {
    // === SUCCESS ===
    const oldOvr = curOvr();
    currentLevel = nextLv;
    totalSuccess++;
    const newOvr = curOvr();

    const card = document.getElementById('playerCard');
    card.classList.add('success-glow');
    setTimeout(() => card.classList.remove('success-glow'), 600);

    spawnParticles('success');
    addHistory('success', `+${nextLv - 1} → +${nextLv}  |  OVR ${oldOvr} → ${newOvr}  |  第${totalAttempts}次成功`);
    showModal('success', nextLv, oldOvr, newOvr);

    if (currentLevel >= stopLevel && autoMode) stopAuto();
  } else {
    // === FAIL ===
    const oldOvr = curOvr();
    const oldLevel = currentLevel;
    const card = document.getElementById('playerCard');

    card.classList.add('fail-shake');
    setTimeout(() => card.classList.remove('fail-shake'), 450);
    spawnParticles('fail');

    let dropTo;
    if (!hasProtection()) {
      if (currentLevel === 2) {
        // +2→+3 失败: 掉至 +1
        dropTo = 1;
      } else if (currentLevel === 3) {
        // +3→+4 失败: 随机掉至 +1 或 +2
        dropTo = Math.random() < 0.5 ? 1 : 2;
      } else if (currentLevel >= 4 && currentLevel <= 7) {
        // +4→+5 ~ +7→+8 失败: 统一掉至 +1
        dropTo = 1;
      } else {
        // +8 及以上失败: 随机掉落至 +1~+6
        dropTo = Math.floor(Math.random() * 6) + 1;
      }
      const dropOvr = baseOvr + data(dropTo).bonus;
      addHistory('fail', `+${oldLevel} → +${nextLv} 失败  |  降至 +${dropTo}  (OVR ${dropOvr})`);
      showModal('fail', oldLevel, oldOvr, dropOvr, nextLv, dropTo);
      currentLevel = dropTo;
    } else {
      // 强化等级保护: 不掉级
      addHistory('fail', `+${oldLevel} → +${nextLv} 失败  |  强化等级保护生效，保持 +${oldLevel}`);
      showModal('protect', oldLevel, oldOvr, oldOvr, nextLv);
    }
  }

  refreshAll();
}

function addHistory(result, desc) {
  history.unshift({ result, desc, num: totalAttempts });
  if (history.length > 500) history.length = 500;
}

// ============================================================
//  Modal
// ============================================================
function showModal(type, level, oldOvr, newOvr, targetLv, dropTo) {
  const overlay = document.getElementById('overlay');
  const icon = document.getElementById('modalIcon');
  const title = document.getElementById('modalTitle');
  const lvl = document.getElementById('modalLevel');
  const ovr = document.getElementById('modalOvr');
  const detail = document.getElementById('modalDetail');

  overlay.classList.add('show');

  switch (type) {
    case 'success':
      icon.textContent = '✨';
      title.textContent = '强化成功！';
      title.className = 'title win';
      lvl.textContent = `球员提升至 +${level}`;
      ovr.textContent = `能力值 ${newOvr}`;
      ovr.className = 'ovr-change';
      detail.textContent = `OVR ${oldOvr} → ${newOvr}  (+${newOvr - oldOvr})  |  材料加成: +${getMaterialBoost()}%`;
      break;

    case 'fail':
      icon.textContent = '💔';
      title.textContent = '强化失败';
      title.className = 'title lose';
      lvl.textContent = `+${level} → +${targetLv} 失败`;
      ovr.textContent = `降至 +${dropTo}  能力值 ${newOvr}`;
      ovr.className = 'ovr-change down';
      detail.textContent = `OVR ${oldOvr} → ${newOvr}  (${newOvr - oldOvr})  |  等级下降 ${level - dropTo} 级`;
      break;

    case 'protect':
      icon.textContent = '🛡️';
      title.textContent = '强化失败 (强化等级保护)';
      title.className = 'title win';
      lvl.textContent = `+${level} → +${targetLv} 失败`;
      ovr.textContent = `保持 +${level}  能力值 ${newOvr}`;
      ovr.className = 'ovr-change';
      detail.textContent = '强化等级保护生效 | 等级不变';
      break;

  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

// ============================================================
//  Rate help tooltip
// ============================================================
let rateTooltipEl = null;

function ensureTooltip() {
  if (!rateTooltipEl) {
    rateTooltipEl = document.createElement('div');
    rateTooltipEl.className = 'rate-tooltip';
    document.body.appendChild(rateTooltipEl);
  }
  return rateTooltipEl;
}

function toggleRateHelp(e) {
  e.preventDefault();
  e.stopPropagation();
  const icon = document.getElementById('rateHelpIcon');
  const tip = ensureTooltip();
  const isShowing = tip.classList.contains('show');

  // Close all rate tooltips first
  tip.classList.remove('show');

  if (!isShowing) {
    tip.textContent = icon.getAttribute('title');
    const rect = icon.getBoundingClientRect();
    tip.style.position = 'fixed';
    tip.style.bottom = 'auto';
    tip.style.right = 'auto';
    tip.style.top = (rect.top - 10) + 'px';
    tip.style.left = Math.max(10, rect.right - 300) + 'px';
    tip.classList.add('show');
    setTimeout(() => {
      const closeHandler = function(ev) {
        if (!tip.contains(ev.target) && ev.target !== icon) {
          tip.classList.remove('show');
          document.removeEventListener('click', closeHandler);
          document.removeEventListener('touchstart', closeHandler);
        }
      };
      document.addEventListener('click', closeHandler);
      document.addEventListener('touchstart', closeHandler);
    }, 10);
  }
}

// ============================================================
//  Success stat tooltip (mobile click)
// ============================================================
let successTipEl = null;

function toggleSuccessTip(e) {
  e.preventDefault();
  e.stopPropagation();
  const box = document.getElementById('statSuccessBox');
  const tipText = box.getAttribute('data-tip');
  if (!tipText || tipText === '暂无成功记录') return;

  if (!successTipEl) {
    successTipEl = document.createElement('div');
    successTipEl.className = 'rate-tooltip';
    document.body.appendChild(successTipEl);
  }

  const isShowing = successTipEl.classList.contains('show');
  successTipEl.classList.remove('show');

  if (!isShowing) {
    successTipEl.textContent = tipText;
    const rect = box.getBoundingClientRect();
    successTipEl.style.position = 'fixed';
    successTipEl.style.bottom = 'auto';
    successTipEl.style.right = 'auto';
    successTipEl.style.top = Math.max(10, rect.top - 10) + 'px';
    successTipEl.style.left = Math.max(10, rect.left - 10) + 'px';
    successTipEl.style.maxWidth = Math.min(320, window.innerWidth - 20) + 'px';
    successTipEl.classList.add('show');
    setTimeout(() => {
      const closeHandler = function(ev) {
        if (!successTipEl.contains(ev.target) && ev.target !== box) {
          successTipEl.classList.remove('show');
          document.removeEventListener('click', closeHandler);
          document.removeEventListener('touchstart', closeHandler);
        }
      };
      document.addEventListener('click', closeHandler);
      document.addEventListener('touchstart', closeHandler);
    }, 10);
  }
}

// ============================================================
//  Particles
// ============================================================
function spawnParticles(type) {
  const layer = document.getElementById('particleLayer');
  const card = document.getElementById('playerCard');
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const isMobile = window.innerWidth < 480;
  const count = type === 'success' ? (isMobile ? 14 : 28) : (isMobile ? 6 : 12);
  const icons = type === 'success'
    ? ['⭐','✨','🔥','💪','⚡','🏆','💎']
    : ['❌','😢','💨'];

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'pt';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    const a = Math.random() * Math.PI * 2;
    const d = 50 + Math.random() * 140;
    el.style.setProperty('--dx', Math.cos(a) * d + 'px');
    el.style.setProperty('--dy', Math.sin(a) * d + 'px');
    el.style.animationDuration = (0.3 + Math.random() * 0.5) + 's';
    layer.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
}

// ============================================================
//  Settings
// ============================================================

// Sync the player select dropdown with current player
function syncPlayerSelect() {
  const sel = document.getElementById('inpPlayerSelect');
  const match = PLAYER_DB.find(p => p.name === playerName);
  if (match) {
    sel.value = match.name;
  } else {
    sel.value = '';
  }
}

function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings(e) {
  if (e && e.target !== document.getElementById('settingsOverlay')) return;
  document.getElementById('settingsOverlay').classList.remove('show');
}

function closeSettingsDirect() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function applySettings() {
  const name = document.getElementById('inpName').value.trim() || 'Unknown Player';
  const season = document.getElementById('inpSeason').value;
  const pos = document.getElementById('inpPos').value.trim() || 'ST';
  const ovr = parseInt(document.getElementById('inpOvr').value) || 89;
  const lv = parseInt(document.getElementById('inpLevel').value) || 0;

  playerName = name;
  playerSeason = season;
  playerPos = pos;
  baseOvr = Math.max(40, Math.min(150, ovr));
  currentLevel = Math.max(1, Math.min(13, lv));

  // Reset stats when changing player
  totalAttempts = 0;
  totalSuccess = 0;
  history = [];
  if (autoMode) stopAuto();

  // Update form fields
  document.getElementById('inpName').value = playerName;
  document.getElementById('inpSeason').value = playerSeason;
  document.getElementById('inpPos').value = playerPos;
  document.getElementById('inpOvr').value = baseOvr;
  document.getElementById('inpLevel').value = currentLevel;
  document.getElementById('inpStopLevel').value = stopLevel;
  document.getElementById('inpMaterialOvr').value = baseOvr;
  clearMaterials();
  // Sync player select dropdown
  syncPlayerSelect();

  // Close settings modal
  closeSettingsDirect();

  refreshAll();
}

// ============================================================
//  Stop Level Input
// ============================================================
document.getElementById('inpStopLevel').addEventListener('input', function() {
  stopLevel = Math.max(1, Math.min(13, parseInt(this.value) || 13));
  this.value = stopLevel;
  document.getElementById('stopLevelDisplay').textContent = '+' + stopLevel;
});

//  Keyboard
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!isEnhancing && canEnhance()) startEnhance();
  }
  if (e.code === 'KeyA') {
    e.preventDefault();
    toggleAuto();
  }
});

populatePlayerSelect();
// ============================================================
//  Init
// ============================================================
refreshAll();

</script>
