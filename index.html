<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FC Online 4 - 球员强化模拟器</title>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #111827;
    --surface2: #161e2c;
    --border: #1e2d3d;
    --gold: #f0b90b;
    --gold2: #d4a00a;
    --gold-dark: #8b6914;
    --success: #00c853;
    --fail: #e53935;
    --text: #e8eaed;
    --text2: #9aa0b0;
    --text3: #5a6070;
    --accent: #2979ff;
    --accent2: #1a50aa;
    --purple: #9c27b0;
    --orange: #ff6d00;
    --red-glow: #ff1744;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Global touch & interaction optimization */
  button, input, select, textarea, [onclick], [tabindex] {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  a, button, [role="button"], input[type="range"] {
    touch-action: manipulation;
  }

  html {
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    overscroll-behavior-y: contain;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 20px 0 40px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(41,121,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(156,39,176,0.04) 0%, transparent 60%);
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    overscroll-behavior-y: contain;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .app { width: 560px; max-width: 100vw; padding: 0 16px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header .brand {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .header h1 {
    font-size: 30px;
    font-weight: 900;
    background: linear-gradient(135deg, #f0b90b 0%, #ffd54f 40%, #ffab00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    letter-spacing: 2px;
  }

  /* Settings Panel */
  .settings-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    margin-bottom: 8px;
    user-select: none;
    padding: 8px 0;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .settings-toggle:hover { color: var(--text); }
  .settings-toggle .arrow {
    transition: transform 0.25s;
    font-size: 10px;
  }
  .settings-toggle .arrow.open { transform: rotate(90deg); }

  .settings-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    display: none;
    animation: slideDown 0.25s ease-out;
  }
  .settings-panel.show { display: block; }
  @keyframes slideDown {
    0% { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .settings-grid .full { grid-column: 1 / -1; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field select {
    width: 100%;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field select { cursor: pointer; }

  /* Player Card */
  .player-card-wrap { position: relative; margin-bottom: 14px; }
  .player-card {
    background: linear-gradient(145deg, #141c2c 0%, #1a2438 30%, #121a28 60%, #151e30 100%);
    border: 1px solid #2a3850;
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
    will-change: transform;
  }
  .player-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(240,185,11,0.03) 0%, transparent 40%, rgba(41,121,255,0.03) 100%);
    pointer-events: none;
  }
  .player-card.enhance-flash { animation: cardFlash 0.1s ease-in-out 3; }
  @keyframes cardFlash {
    0%,100% { border-color: #2a3850; box-shadow: none; }
    50% { border-color: #f0b90b; box-shadow: 0 0 20px rgba(240,185,11,0.25); }
  }
  .player-card.success-glow {
    border-color: var(--success) !important;
    box-shadow: 0 0 24px rgba(0,200,83,0.3) !important;
    transition: all 0.5s;
  }
  .player-card.fail-shake { animation: shake 0.3s ease-out; will-change: transform; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-8px); }
    30% { transform: translateX(8px); }
    45% { transform: translateX(-6px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
    90% { transform: translateX(3px); }
  }
.player-avatar {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1e3050, #152030);
    border: 2px solid #334868;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    transition: all 0.25s;
    will-change: transform, box-shadow;
  }
  .player-avatar.elite { border-color: #f0b90b; box-shadow: 0 0 12px rgba(240,185,11,0.3); }
  .player-avatar.legend { border-color: #9c27b0; box-shadow: 0 0 12px rgba(156,39,176,0.4); }
  .player-avatar.ultimate { border-color: #ff6d00; box-shadow: 0 0 14px rgba(255,109,0,0.4); animation: ultimateGlow 1.5s ease-in-out infinite; }
  @keyframes ultimateGlow {
    0%,100% { box-shadow: 0 0 14px rgba(255,109,0,0.4); }
    50% { box-shadow: 0 0 24px rgba(255,109,0,0.7), 0 0 40px rgba(255,152,0,0.3); }
  }

  .player-info { flex: 1; position: relative; z-index: 1; min-width: 0; }
  .player-season {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .season-default { background: #2a3850; color: #8899bb; }
  .season-toty { background: #1a3a6a; color: #6ab4ff; }
  .season-tots { background: #1a4a3a; color: #4ae0a0; }
  .season-icon { background: #2a1a3a; color: #c090e0; }
  .season-hot { background: #4a1a1a; color: #ff7070; }
  .season-live { background: #1a3a2a; color: #70d070; }
  .season-25ucl { background: #0a1e3a; color: #6ab4ff; }
  .player-name { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.3; }
  .player-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .player-ovr-row { display: flex; align-items: baseline; gap: 10px; margin-top: 6px; }
  .player-ovr {
    font-size: 40px; font-weight: 900;
    background: linear-gradient(180deg, #fff 0%, #d0d8e8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .player-ovr.bump { animation: ovrBump 0.35s ease-out; will-change: transform; }
  @keyframes ovrBump {
    0% { transform: scale(1.4); filter: brightness(2); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .enhance-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0b90b, #c8900a);
    color: #1a0a00;
    font-size: 13px;
    font-weight: 900;
    padding: 3px 10px;
    border-radius: 5px;
    min-width: 36px;
    box-shadow: 0 2px 8px rgba(240,185,11,0.3);
  }

  /* Trait / Extra info */
  .card-extra {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .trait-slot {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1px dashed #3a4860;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: #5a6070;
  }
  .trait-slot.active {
    border: 1px solid #5a7090;
    background: rgba(90,112,144,0.15);
    color: #8899bb;
  }
  .est-value {
    font-size: 11px;
    color: var(--gold);
    margin-top: 4px;
    font-weight: 600;
  }

  /* Progress Bar */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-title { font-size: 12px; color: var(--text2); font-weight: 600; }
  .progress-rate { font-size: 12px; color: var(--text2); }
  .progress-rate strong { color: #fff; }
  .rate-help {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #3a4860;
    color: #889;
    font-size: 10px;
    font-weight: 700;
    cursor: help;
    vertical-align: middle;
    margin-left: 2px;
    touch-action: manipulation;
  }
  .rate-help:hover { background: #f0b90b; color: #000; }

  .progress-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    overflow: hidden;
  }
  .progress-step {
    width: 26px; height: 26px;
    min-width: 16px;
    border-radius: 5px;
    background: #141c28;
    border: 1px solid #222d3d;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: #3a4860;
    transition: all 0.35s;
    flex-shrink: 1;
  }
  @media (max-width: 480px) {
    .progress-bar { gap: 0; }
    .progress-step {
      width: 18px; height: 18px;
      min-width: 14px;
      font-size: 7px;
      border-radius: 3px;
    }
    .progress-arrow {
      font-size: 7px;
      flex-shrink: 1;
      margin: 0;
    }
  }
  .progress-step.reached {
    background: #182a20;
    border-color: #2a4a30;
    color: #6aaa70;
  }
  .progress-step.current {
    background: linear-gradient(135deg, #6a3808, #4a2804);
    border-color: #f0b90b;
    color: #fff;
    box-shadow: 0 0 10px rgba(240,185,11,0.35);
    animation: stepPulse 0.6s ease-in-out infinite;
    will-change: box-shadow;
    transform: scale(1.1);
    z-index: 1;
  }
  @keyframes stepPulse {
    0%,100% { box-shadow: 0 0 10px rgba(240,185,11,0.35); }
    50% { box-shadow: 0 0 18px rgba(240,185,11,0.55); }
  }
  .progress-arrow {
    font-size: 10px;
    color: #2a3850;
    flex-shrink: 0;
    margin: 0 1px;
  }

  /* Info Row */
  .info-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .info-chip {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .info-chip .val { font-size: 16px; font-weight: 700; color: #fff; }
  .info-chip .val.gold { color: var(--gold); }
  .info-chip .val.green { color: var(--success); }
  .info-chip .val.red { color: var(--fail); }
  .info-chip .lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* Protection */
  .protect-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text2);
  }
  .protect-left { display: flex; align-items: center; gap: 10px; }
  .toggle-switch {
    position: relative;
    width: 44px; height: 24px;
    background: #2a3850;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-switch.on { background: #f0b90b; }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.25s;
  }
  .toggle-switch.on::after { transform: translateX(20px); }
  .energy-slot {
    flex: 1; height: 36px;
    border-radius: 6px;
    background: #1a2230;
    border: 2px solid #2a3850;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .energy-slot:hover { border-color: #4a6090; }
  .energy-slot .fill {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #2979ff 0%, #1a50cc 100%);
    transition: width 0.3s ease;
    border-radius: 4px;
  }
  .energy-slot.filled {
    border-color: #2979ff;
    box-shadow: 0 0 8px rgba(41,121,255,0.3);
  }
  .protect-badge {
    font-size: 11px;
    background: rgba(240,185,11,0.15);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .btn {
    padding: 12px 18px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: 0.5px;
    user-select: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }
  .btn-main {
    flex: 1;
    background: linear-gradient(180deg, #f0b90b 0%, #d4a00a 40%, #a07808 100%);
    color: #1a0a00;
    font-size: 20px;
    letter-spacing: 4px;
    box-shadow: 0 4px 16px rgba(240,185,11,0.3);
    position: relative;
    overflow: hidden;
  }
  .btn-main:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(240,185,11,0.45);
  }
  .btn-main:active:not(:disabled) { transform: translateY(1px); }
  .btn-main.charging {
    animation: btnCharge 0.2s ease-in-out infinite;
    background: linear-gradient(180deg, #ffcc00 0%, #f0b90b 40%, #c8900a 100%);
  }
  @keyframes btnCharge {
    0%,100% { box-shadow: 0 4px 16px rgba(240,185,11,0.3); }
    50% { box-shadow: 0 4px 32px rgba(240,185,11,0.7), 0 0 60px rgba(240,185,11,0.3); }
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) { background: #1e2a3a; color: #fff; }
  .btn-secondary.active {
    background: #1a2a5a;
    border-color: var(--accent);
    color: #aaccff;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
  }
  .stat-box .num { font-size: 20px; font-weight: 700; color: #fff; }
  .stat-box .num.g { color: var(--gold); }
  .stat-box .num.s { color: var(--success); }
  .stat-box .num.f { color: var(--fail); }
  .stat-box .tag { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* History */
  .history-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    max-height: 200px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    scroll-behavior: smooth;
    will-change: scroll-position;
  }
  .history-box::-webkit-scrollbar { width: 4px; }
  .history-box::-webkit-scrollbar-thumb { background: #2a3850; border-radius: 2px; }
  .history-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
  .history-list { list-style: none; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 4px;
    border-bottom: 1px solid rgba(30,40,56,0.6);
    font-size: 12px;
  }
  .history-item:last-child { border-bottom: none; }
  .hist-num { color: var(--text3); font-size: 10px; min-width: 24px; }
  .hist-tag {
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    flex-shrink: 0;
  }
  .hist-tag.win { background: rgba(0,200,83,0.15); color: var(--success); }
  .hist-tag.lose { background: rgba(229,57,53,0.15); color: var(--fail); }
.history-item {
    position: relative;
    cursor: default;
  }
  /* 成功次数统计hover弹窗 */
  .stat-box.clickable { cursor: pointer; position: relative; touch-action: manipulation; }
  .stat-box.clickable:hover::after {
    content: attr(data-tip);
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translateX(-50%);
    background: #0a0a0a;
    color: #f0b90b;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    white-space: pre;
    z-index: 50;
    pointer-events: none;
    margin-bottom: 6px;
    border: 1px solid #f0b90b;
    line-height: 1.6;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }
  .hist-detail { color: var(--text2); flex: 1; }
  .hist-empty { color: var(--text3); text-align: center; padding: 20px; font-size: 12px; }

  /* Result Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay .modal {
    background: linear-gradient(160deg, #1a2438, #111c2c);
    border: 1px solid #2a3850;
    border-radius: 16px;
    padding: 36px 44px;
    text-align: center;
    min-width: 300px;
    max-width: 380px;
    animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    will-change: transform, opacity;
  }
  @keyframes modalPop {
    0% { transform: scale(0.8) translateY(30px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal .icon { font-size: 56px; margin-bottom: 10px; }
  .modal .title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .modal .title.win { color: #fff; }
  .modal .title.lose { color: var(--fail); }
  .modal .title.crack { color: var(--red-glow); }
  .modal .level-change { font-size: 15px; color: var(--text2); margin-bottom: 6px; }
  .modal .ovr-change {
    font-size: 28px; font-weight: 900; margin-bottom: 8px;
    background: linear-gradient(180deg, #f0b90b, #c8900a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .modal .ovr-change.down {
    background: linear-gradient(180deg, #ff5252, #c62828);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .modal .detail-text { font-size: 12px; color: var(--text3); margin-bottom: 18px; line-height: 1.6; }
  .modal .btn-close {
    padding: 10px 36px;
    border-radius: 8px;
    border: none;
    background: #2a3850;
    color: #ccd;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .modal .btn-close:hover { background: #3a4860; color: #fff; }

  /* Particles */
  .particle-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 250;
  }
  .pt {
    position: absolute;
    font-size: 22px;

// ============================================================
//  State
// ============================================================
let baseOvr = 123;
let currentLevel = 1;
let playerName = '哈里·凯恩';
let playerPos = '中锋';
let playerSeason = '25ucl';
let totalAttempts = 0;
let totalSuccess = 0;
let protectCount = 0;
let autoMode = false;
let stopLevel = 13;
let autoTimer = null;
let isEnhancing = false;
let history = [];

// Settings panel
let settingsOpen = false;
let materialCards = []; // {ovr: number}

// ============================================================
//  Material Card Energy Bar
// ============================================================
function addMaterial() {
  if (materialCards.length >= 5) return;
  const inp = document.getElementById('inpMaterialOvr');
  const ovr = Math.max(40, Math.min(150, parseInt(inp.value) || baseOvr));
  inp.value = ovr;
  materialCards.push({ ovr });
  updateEnergyBar();
}

function clearMaterials() {
  materialCards = [];
  updateEnergyBar();
}

function clickSlot(n) {
  // Manual fill: clicking slot N means fill slots 1..N
  const currentFilled = Math.round(getTotalFill());
  if (currentFilled === n) {
    // Toggle off
    materialCards = [];
  } else {
    // Fill to N slots with current-OVR materials
    materialCards = [];
    for (let i = 0; i < n; i++) {
      materialCards.push({ ovr: curOvr() });
    }
  }
  updateEnergyBar();
}

function calcFillRatio(matOvr) {
  // 以球员当前实际OVR为基准（非基础OVR）
  const currentOvr = curOvr();
  const diff = matOvr - currentOvr;
  return Math.max(0.1, 1.0 + diff * 0.1);
}

function getTotalFill() {
  let total = 0;
  materialCards.forEach(m => { total += calcFillRatio(m.ovr); });
  return Math.min(total, 5);
}

function getMaterialBoost() {
  return Math.round(getTotalFill()) * 1; // 每格 +1% 成功率
}

function updateEnergyBar() {
  const totalFill = getTotalFill();
  const fullSlots = Math.floor(totalFill);
  const partialFill = totalFill - fullSlots;

  for (let i = 0; i < 5; i++) {
    const slot = document.querySelector(`.energy-slot[data-slot="${i+1}"]`);
    if (!slot) continue;
    // Clear old fill
    const oldFill = slot.querySelector('.fill');
    if (oldFill) oldFill.remove();

    if (i < fullSlots) {
      // Fully filled
      slot.classList.add('filled');
      const fill = document.createElement('div');
      fill.className = 'fill';
      fill.style.width = '100%';
      slot.appendChild(fill);
    } else if (i === fullSlots && partialFill > 0) {
      // Partially filled
      slot.classList.add('filled');
      const fill = document.createElement('div');
      fill.className = 'fill';
      fill.style.width = (partialFill * 100) + '%';
      slot.appendChild(fill);
    } else {
      // Empty
      slot.classList.remove('filled');
    }
  }

  document.getElementById('materialCount').textContent = `已填 ${materialCards.length}/5`;
  const boost = getMaterialBoost();
  document.getElementById('materialBoost').textContent = '+' + boost + '%';
}

function getFinalRate(baseRate) {
  const boost = getMaterialBoost() / 100; // convert to decimal
  return Math.min(1, baseRate + boost);
}


// ============================================================
//  Helpers
// ============================================================
function data(lv) { return TABLE.find(d => d.level === lv) || TABLE[0]; }
function curOvr() { return baseOvr + data(currentLevel).bonus; }
function canEnhance() { return currentLevel < 13; }

// ============================================================
//  UI Update
// ============================================================
function refreshAll() {
  const d = data(currentLevel);
  const ovr = curOvr();
  const nextLv = currentLevel + 1;
  const canUp = canEnhance();
  const nextD = canUp ? data(nextLv) : null;

  // Player card
  document.getElementById('playerOvr').textContent = ovr;
  document.getElementById('enhanceBadge').textContent = '+' + currentLevel;
  document.getElementById('playerName').textContent = playerName;
  document.getElementById('playerMeta').textContent = playerPos;

  // Season badge
  const sEl = document.getElementById('playerSeason');
  const seasonNames = {
    default:'基础卡', live:'LIVE', hot:'HOT', tots:'TOTS', toty:'TOTY',
    icon:'ICON', 'icon-tm':'ICON TM', wc:'WC', ucl:'UCL', ng:'NG', cap:'CAP'
  };
  sEl.textContent = seasonNames[playerSeason] || playerSeason.toUpperCase();
  sEl.className = 'player-season';
  if (playerSeason === 'tots') sEl.classList.add('season-tots');
  else if (playerSeason === 'toty') sEl.classList.add('season-toty');
  else if (playerSeason === 'icon' || playerSeason === 'icon-tm') sEl.classList.add('season-icon');
  else if (playerSeason === 'hot') sEl.classList.add('season-hot');
  else if (playerSeason === 'live') sEl.classList.add('season-live');
  else if (playerSeason === '25ucl') sEl.classList.add('season-25ucl');
  else sEl.classList.add('season-default');

  // Avatar
  const avatar = document.getElementById('playerAvatar');
  avatar.classList.remove('elite','legend','ultimate');
  if (currentLevel >= 12) avatar.classList.add('ultimate');
  else if (currentLevel >= 8) avatar.classList.add('legend');
  else if (currentLevel >= 5) avatar.classList.add('elite');

  // Trait slots (特性槽)
  const traitCount = currentLevel >= 12 ? 7 : currentLevel >= 9 ? 6 : currentLevel >= 6 ? 5 : currentLevel >= 3 ? 4 : 3;
  let traitHtml = '';
  for (let i = 0; i < 7; i++) {
    traitHtml += `<div class="trait-slot${i < traitCount ? ' active' : ''}">${i < traitCount ? '◆' : ''}</div>`;
  }
  document.getElementById('traitSlots').innerHTML = traitHtml;

  // Estimated value
  const baseVal = baseOvr * baseOvr * 80;
  const lvMult = [1, 1.2, 1.5, 2, 3, 5, 8, 14, 22, 35, 55, 85, 130, 200];
  const val = Math.floor(baseVal * lvMult[currentLevel] / 10000);
  document.getElementById('estValue').textContent = '💰 预计价值: ' + (val >= 1 ? val + '万 BP' : '--');

  // Progress bar
  renderProgress();

  // Rate info
  if (!canUp) {
    document.getElementById('rateInfo').innerHTML = '<strong style="color:#f0b90b;">已满级 MAX +13</strong>';
    document.getElementById('btnEnhance').disabled = true;
    document.getElementById('btnEnhance').textContent = '已满级';
  } else {
    const effectiveRate = getFinalRate(nextD.rate);
    const r = (effectiveRate * 100);
    const rStr = r >= 1 ? r.toFixed(0) + '%' : r.toFixed(1) + '%';
    const boost = getMaterialBoost();
    const boostStr = boost > 0 ? ` <span style="color:#2979ff;font-size:11px;">(含材料+${boost}%)</span>` : '';
    document.getElementById('rateInfo').innerHTML = `+${currentLevel} → +${nextLv} 成功率 <strong>${rStr}</strong>${boostStr} <span class="rate-help" title="1. 2024年3月起Nexon依法在FC Online官网「数据中心」公开的概率。&#10;2. Inven / DC Inside 社区实测 — 韩国玩家大量实测数据验证，每格材料卡贡献约 +1% 基础成功率&#10;3. 贴吧 / NGA 中文社区 — 国服腾讯 FC Online 4 材料卡加成与韩服一致，均为每格 +1%">?</span>`;
    document.getElementById('btnEnhance').disabled = false;
    document.getElementById('btnEnhance').textContent = '强 化';
  }

  // Info chips
  document.getElementById('infoNextLevel').textContent = canUp ? '+' + nextLv : 'MAX';
  document.getElementById('infoRate').textContent = canUp ? ((getFinalRate(nextD.rate)*100) >= 1 ? (getFinalRate(nextD.rate)*100).toFixed(0)+'%' : (getFinalRate(nextD.rate)*100).toFixed(1)+'%') : '-';
  document.getElementById('infoOvrGain').textContent = canUp ? ('+' + nextD.gain) : '-';
  document.getElementById('infoTargetOvr').textContent = canUp ? (baseOvr + nextD.bonus) : (baseOvr + d.bonus);

  // Protection badge
  if (currentLevel >= 5 && protectCount === 0) {
    document.getElementById('protectBadge').style.display = 'inline';
  } else {
    document.getElementById('protectBadge').style.display = 'none';
  }

  // Stats
  document.getElementById('sAttempts').textContent = totalAttempts;
  document.getElementById('sSuccess').textContent = totalSuccess;
  // Build all-success tip
  const successes = history.filter(h => h.result === 'success');
  let allSuccessTip = '';
  if (successes.length === 0) {
    allSuccessTip = '暂无成功记录';
  } else {
    allSuccessTip = successes.map(h => {
      const parts = h.desc.split(' | ');
      return parts[0] + '\n' + parts[parts.length - 1];
    }).join('\n———\n');
  }
  document.getElementById('statSuccessBox').setAttribute('data-tip', allSuccessTip);
  document.getElementById('sFail').textContent = totalAttempts - totalSuccess;

  document.getElementById('stopLevelDisplay').textContent = '+' + ((stopLevel > 13) ? 13 : stopLevel);

  // Button state
  if (!canUp) {
    document.getElementById('btnEnhance').disabled = true;
    if (autoMode) stopAuto();
  }

  renderHistory();
}

function renderProgress() {
  let html = '';
  for (let i = 0; i <= 13; i++) {
    if (i > 0) html += '<span class="progress-arrow">›</span>';
    let cls = 'progress-step';
    if (i < currentLevel) cls += ' reached';
    if (i === currentLevel) cls += ' current';
    html += `<div class="${cls}" title="+${i}: OVR ${baseOvr + data(i).bonus}">+${i}</div>`;
  }
  document.getElementById('progressBar').innerHTML = html;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<li class="hist-empty">等待首次强化...</li>';
    return;
  }
  list.innerHTML = history.slice(0, 50).map(h => {
    let tagCls, tagText;
    if (h.result === 'success') { tagCls = 'win'; tagText = '成功'; }
    else { tagCls = 'lose'; tagText = '失败'; }
    return `<li class="history-item">
      <span class="hist-num">#${h.num}</span>
      <span class="hist-tag ${tagCls}">${tagText}</span>
      <span class="hist-detail">${h.desc}</span>
    </li>`;
  }).join('');
}

// ============================================================
//  Actions
// ============================================================
function onProtectSlider() {
  const slider = document.getElementById('protectSlider');
  protectCount = parseInt(slider.value) || 0;
  document.getElementById('protectCount').textContent = protectCount;
}
function hasProtection() { return protectCount > 0; }

function toggleAuto() {
  if (autoMode) { stopAuto(); } else { startAuto(); }
}

function startAuto() {
  if (!canEnhance()) return;
  autoMode = true;
  const btn = document.getElementById('btnAuto');
  btn.textContent = '停止';
  btn.classList.add('active');
  doAutoStep();
}

function stopAuto() {
  autoMode = false;
  const btn = document.getElementById('btnAuto');
  btn.textContent = '自动';
  btn.classList.remove('active');
  if (autoTimer) clearTimeout(autoTimer);
}

function doAutoStep() {
  if (!autoMode || !canEnhance()) { stopAuto(); return; }
  if (currentLevel >= stopLevel) { stopAuto(); return; }
  if (!isEnhancing) startEnhance();
  autoTimer = setTimeout(() => doAutoStep(), 1800);
}

function resetCard() {
  if (isEnhancing) return;
  if (autoMode) stopAuto();
  currentLevel = 0;
  totalAttempts = 0;
  totalSuccess = 0;
  history = [];
  stopLevel = 13;
  document.getElementById('inpStopLevel').value = 13;
  protectCount = 0;
  document.getElementById('protectSlider').value = 0;
  document.getElementById('protectCount').textContent = '0';
  clearMaterials();
  document.getElementById('inpMaterialOvr').value = baseOvr;
  refreshAll();
}

function startEnhance() {
  if (isEnhancing || !canEnhance()) return;
  isEnhancing = true;

  const btn = document.getElementById('btnEnhance');
  const card = document.getElementById('playerCard');
  btn.classList.add('charging');
  btn.textContent = '强化中...';
  btn.disabled = true;
  card.classList.add('enhance-flash');

  setTimeout(() => {
    executeEnhance();
    isEnhancing = false;
    btn.classList.remove('charging');
    btn.disabled = false;
    btn.textContent = '强 化';
    card.classList.remove('enhance-flash');
  }, 1300);
}

function executeEnhance() {
  const nextLv = currentLevel + 1;
  const nextD = data(nextLv);
  const rate = getFinalRate(nextD.rate);
  const roll = Math.random();
  const success = roll < rate;

  totalAttempts++;

  if (success) {
    // === SUCCESS ===
    const oldOvr = curOvr();
    currentLevel = nextLv;
    totalSuccess++;
    const newOvr = curOvr();

    const card = document.getElementById('playerCard');
    card.classList.add('success-glow');
    setTimeout(() => card.classList.remove('success-glow'), 600);

    spawnParticles('success');
    addHistory('success', `+${nextLv - 1} → +${nextLv}  |  OVR ${oldOvr} → ${newOvr}  |  第${totalAttempts}次成功`);
    showModal('success', nextLv, oldOvr, newOvr);

    if (currentLevel >= stopLevel && autoMode) stopAuto();
  } else {
    // === FAIL ===
    const oldOvr = curOvr();
    const oldLevel = currentLevel;
    const card = document.getElementById('playerCard');

    // 失败规则：+1~+4 不掉级，+5及以上掉1级
    card.classList.add('fail-shake');
    setTimeout(() => card.classList.remove('fail-shake'), 450);
    spawnParticles('fail');

    if (currentLevel >= 5 && !hasProtection()) {
      // 掉1级
      const dropTo = currentLevel - 1;
      addHistory('fail', `+${oldLevel} → +${nextLv} 失败  |  降至 +${dropTo}`);
      showModal('fail', oldLevel, oldOvr, baseOvr + data(dropTo).bonus, nextLv, dropTo);
      currentLevel = dropTo;
    } else if (hasProtection() && currentLevel >= 5) {
      // 有保护，不掉级
      addHistory('fail', `+${oldLevel} → +${nextLv} 失败  |  强化等级保护生效，保持 +${oldLevel}`);
      showModal('protect', oldLevel, oldOvr, oldOvr, nextLv);
    } else {
      // +1~+4 不掉级
      addHistory('fail', `+${oldLevel} → +${nextLv} 失败  |  不掉级，保持 +${oldLevel}`);
      showModal('failSafe', oldLevel, oldOvr, oldOvr, nextLv);
    }
  }

  refreshAll();
}

function addHistory(result, desc) {
  history.unshift({ result, desc, num: totalAttempts });
  if (history.length > 100) history.length = 100;
}

// ============================================================
//  Modal
// ============================================================
function showModal(type, level, oldOvr, newOvr, targetLv, dropTo) {
  const overlay = document.getElementById('overlay');
  const icon = document.getElementById('modalIcon');
  const title = document.getElementById('modalTitle');
  const lvl = document.getElementById('modalLevel');
  const ovr = document.getElementById('modalOvr');
  const detail = document.getElementById('modalDetail');

  overlay.classList.add('show');

  switch (type) {
    case 'success':
      icon.textContent = '✨';
      title.textContent = '强化成功！';
      title.className = 'title win';
      lvl.textContent = `球员提升至 +${level}`;
      ovr.textContent = `能力值 ${newOvr}`;
      ovr.className = 'ovr-change';
      detail.textContent = `OVR ${oldOvr} → ${newOvr}  (+${newOvr - oldOvr})  |  材料加成: +${getMaterialBoost()}%`;
      break;

    case 'fail':
      icon.textContent = '💔';
      title.textContent = '强化失败';
      title.className = 'title lose';
      lvl.textContent = `+${level} → +${targetLv} 失败`;
      ovr.textContent = `降至 +${dropTo}  能力值 ${newOvr}`;
      ovr.className = 'ovr-change down';
      detail.textContent = `OVR ${oldOvr} → ${newOvr}  (${newOvr - oldOvr})  |  强化等级下降 1 级`;
      break;

    case 'failSafe':
      icon.textContent = '😞';
      title.textContent = '强化失败';
      title.className = 'title lose';
      lvl.textContent = `+${level} → +${targetLv} 失败`;
      ovr.textContent = `保持 +${level}  能力值 ${newOvr}`;
      ovr.className = 'ovr-change';
      detail.textContent = '+1~+4 阶段失败不掉级，请继续尝试';
      break;

    case 'protect':
      icon.textContent = '🛡️';
      title.textContent = '强化失败 (强化等级保护)';
      title.className = 'title win';
      lvl.textContent = `+${level} → +${targetLv} 失败`;
      ovr.textContent = `保持 +${level}  能力值 ${newOvr}`;
      ovr.className = 'ovr-change';
      detail.textContent = '强化等级保护生效 | 等级不变';
      break;

  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

// ============================================================
//  Particles
// ============================================================
function spawnParticles(type) {
  const layer = document.getElementById('particleLayer');
  const card = document.getElementById('playerCard');
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const isMobile = window.innerWidth < 480;
  const count = type === 'success' ? (isMobile ? 14 : 28) : (isMobile ? 6 : 12);
  const icons = type === 'success'
    ? ['⭐','✨','🔥','💪','⚡','🏆','💎']
    : ['❌','😢','💨'];

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'pt';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    const a = Math.random() * Math.PI * 2;
    const d = 50 + Math.random() * 140;
    el.style.setProperty('--dx', Math.cos(a) * d + 'px');
    el.style.setProperty('--dy', Math.sin(a) * d + 'px');
    el.style.animationDuration = (0.3 + Math.random() * 0.5) + 's';
    layer.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
}

// ============================================================
//  Settings
// ============================================================

// Sync the player select dropdown with current player
function syncPlayerSelect() {
  const sel = document.getElementById('inpPlayerSelect');
  const match = PLAYER_DB.find(p => p.name === playerName);
  if (match) {
    sel.value = match.name;
  } else {
    sel.value = '';
  }
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('show', settingsOpen);
  document.getElementById('settingsArrow').classList.toggle('open', settingsOpen);
}

function applySettings() {
  const name = document.getElementById('inpName').value.trim() || 'Unknown Player';
  const season = document.getElementById('inpSeason').value;
  const pos = document.getElementById('inpPos').value.trim() || 'ST';
  const ovr = parseInt(document.getElementById('inpOvr').value) || 89;
  const lv = parseInt(document.getElementById('inpLevel').value) || 0;

  playerName = name;
  playerSeason = season;
  playerPos = pos;
  baseOvr = Math.max(40, Math.min(150, ovr));
  currentLevel = Math.max(0, Math.min(13, lv));

  // Reset stats when changing player
  totalAttempts = 0;
  totalSuccess = 0;
  history = [];
  if (autoMode) stopAuto();

  // Update form fields
  document.getElementById('inpName').value = playerName;
  document.getElementById('inpSeason').value = playerSeason;
  document.getElementById('inpPos').value = playerPos;
  document.getElementById('inpOvr').value = baseOvr;
  document.getElementById('inpLevel').value = currentLevel;
  document.getElementById('inpStopLevel').value = stopLevel;
  document.getElementById('inpMaterialOvr').value = baseOvr;
  clearMaterials();
  // Sync player select dropdown
  syncPlayerSelect();

  refreshAll();
}

// ============================================================
//  Stop Level Input
// ============================================================
document.getElementById('inpStopLevel').addEventListener('input', function() {
  stopLevel = Math.max(1, Math.min(13, parseInt(this.value) || 13));
  this.value = stopLevel;
  document.getElementById('stopLevelDisplay').textContent = '+' + stopLevel;
});

//  Keyboard
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!isEnhancing && canEnhance()) startEnhance();
  }
  if (e.code === 'KeyA') {
    e.preventDefault();
    toggleAuto();
  }
});

populatePlayerSelect();
// ============================================================
//  Init
// ============================================================
refreshAll();
</script>
